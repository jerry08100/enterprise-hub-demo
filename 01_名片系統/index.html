<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名片系統 Card CRM — 企業平台</title>
<style>
  :root{
    --bg:#F5F2F4; --surface:#FFFFFF; --surface-2:#F7F3F5;
    --ink:#2A1C24; --ink-2:#6E5A64; --ink-3:#A2909A;
    --line:#EBE0E6; --line-2:#F2E9EE;
    --accent:#BE185D; --accent-ink:#9D174D; --accent-soft:#FCE7F0;
    --r:14px; --r-sm:9px; --r-lg:18px;
    --sh-1:0 1px 2px rgba(60,20,40,.05);
    --sh-2:0 16px 40px rgba(60,20,40,.13),0 2px 8px rgba(60,20,40,.06);
    --glow:0 8px 22px rgba(190,24,93,.24);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --danger:#C0392B; --danger-bg:#F8E7E4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(rgba(60,20,40,.03) 1px,transparent 1px) 0 0/24px 24px,radial-gradient(1000px 560px at 88% -12%,rgba(190,24,93,.09),transparent 60%),var(--bg);
    background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  svg{display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:34px 26px 70px}

  .topbar{display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap}
  .topbar .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:var(--glow);flex:none}
  .topbar b{font-size:18px} .topbar .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.2em;font-family:var(--mono)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .who{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 7px 5px 13px;box-shadow:var(--sh-1)}
  .who .nm{font-size:12.5px;font-weight:600} .who .av{width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;font-size:12px}
  .home-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink-2);box-shadow:var(--sh-1);transition:.15s}
  .home-btn:hover{border-color:var(--accent);color:var(--accent-ink)}

  .hero{margin:14px 0 16px}
  .hero .k{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);color:var(--accent);font-size:11px;letter-spacing:.2em;margin-bottom:10px}
  .hero .k::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
  .hero h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .hero p{color:var(--ink-2);font-size:13px;margin-top:7px;max-width:620px;line-height:1.6}

  .stats{display:flex;gap:10px;margin:16px 0 14px;flex-wrap:wrap}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 16px;box-shadow:var(--sh-1);display:flex;align-items:center;gap:10px}
  .stat .n{font-size:20px;font-weight:800} .stat .l{font-size:11.5px;color:var(--ink-3);font-weight:600}
  .stat .dot{width:10px;height:10px;border-radius:50%}

  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 13px;box-shadow:var(--sh-1)}
  .search svg{color:var(--ink-3);flex:none} .search input{border:none;outline:none;background:none;font-family:inherit;font-size:13.5px;width:100%;color:var(--ink)}
  .sel{font-family:inherit;font-size:13px;font-weight:700;padding:9px 12px;border:1px solid var(--line);border-radius:11px;background:var(--surface);color:var(--ink);box-shadow:var(--sh-1);cursor:pointer}
  .sel:focus{outline:none;border-color:var(--accent)}
  .btn-add{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--glow);transition:.15s}
  .btn-add:hover{filter:brightness(1.06);transform:translateY(-1px)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .ccard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1);padding:18px;cursor:pointer;transition:.16s;position:relative}
  .ccard:hover{transform:translateY(-3px);box-shadow:0 16px 36px -14px rgba(190,24,93,.4);border-color:var(--accent-soft)}
  .ccard .ch{display:flex;align-items:center;gap:12px}
  .ccard .cav{width:46px;height:46px;border-radius:12px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:18px;font-weight:800;flex:none}
  .ccard .cn{font-size:16px;font-weight:800} .ccard .ct{font-size:12.5px;color:var(--ink-2)}
  .ccard .ci{margin-top:13px;display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--ink-2)}
  .ccard .ci div{display:flex;align-items:center;gap:8px} .ccard .ci svg{color:var(--ink-3);flex:none}
  .ccard .cf{margin-top:13px;padding-top:12px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
  .badge{font-size:11px;font-weight:700;border-radius:999px;padding:3px 11px;display:inline-flex;align-items:center;gap:5px}
  .vcount{font-size:11.5px;color:var(--ink-3);font-weight:600}
  .empty{text-align:center;color:var(--ink-3);padding:50px 20px;font-size:13.5px}

  .foot{margin-top:26px;color:var(--ink-3);font-size:12px;line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
  .demo-flag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--accent-ink);background:var(--accent-soft);padding:2px 9px;border-radius:999px;font-weight:600}

  .ov{display:none;position:fixed;inset:0;background:rgba(50,20,35,.46);z-index:100;place-items:center;padding:20px}
  .ov.show{display:grid}
  .modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-2);width:min(500px,100%);max-height:90vh;overflow:auto;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .modal h3{font-size:17px;font-weight:800;padding:18px 20px 0} .modal .sub2{font-size:12.5px;color:var(--ink-3);padding:3px 20px 0}
  .mbody{padding:16px 20px;display:flex;flex-direction:column;gap:13px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--ink);resize:vertical}
  .fld textarea{min-height:72px;line-height:1.6}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .ocr{display:flex;align-items:center;gap:9px;background:var(--accent-soft);border:1px dashed var(--accent);border-radius:10px;padding:11px 13px;cursor:pointer;color:var(--accent-ink);font-size:12.5px;font-weight:600}
  .ocr:hover{background:var(--accent-soft)}
  .err{font-size:12px;color:#e06a5f;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 11px;display:none}.err.show{display:block}

  .detail-info{display:flex;align-items:center;gap:14px;padding:0 20px}
  .detail-info .dav{width:58px;height:58px;border-radius:14px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:23px;font-weight:800;flex:none}
  .detail-info .dn{font-size:19px;font-weight:800} .detail-info .dt{font-size:13px;color:var(--ink-2)}
  .info-list{display:flex;flex-direction:column;gap:8px}
  .info-list .il{display:flex;align-items:center;gap:10px;font-size:13.5px} .info-list .il svg{color:var(--accent-ink);flex:none}
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:4px 0 2px}
  .sec-h .t{font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px}
  .mini{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--surface-2);color:var(--accent-ink);border-radius:8px;padding:6px 11px;cursor:pointer}
  .mini:hover{border-color:var(--accent)}
  .intv{border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:var(--surface)}
  .intv .ih{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .intv .idate{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink-2)}
  .intv .itype{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:999px;padding:2px 9px}
  .intv .istaff{font-size:11.5px;color:var(--ink-3);margin-left:auto}
  .intv .isum{font-size:13px;line-height:1.55} .intv .inext{font-size:12px;color:var(--accent-ink);margin-top:5px;display:flex;align-items:center;gap:6px}
  .intv .idel{float:right;border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:15px} .intv .idel:hover{color:var(--danger)}
  .mfoot{display:flex;gap:9px;justify-content:flex-end;padding:14px 20px 18px;align-items:center}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)} .btn.go{background:var(--accent);color:#fff;box-shadow:var(--glow)}
  .btn.danger{background:var(--surface);color:var(--danger);border:1px solid var(--line)} .btn.danger:hover{border-color:var(--danger)}
  .mfoot .spread{margin-right:auto}

  .gate{display:none;position:fixed;inset:0;background:rgba(50,20,35,.55);backdrop-filter:blur(3px);z-index:300;place-items:center;padding:20px}
  .gate.show{display:grid}
  .gate-card{background:var(--surface);border-radius:18px;box-shadow:var(--sh-2);max-width:380px;width:100%;padding:26px;text-align:center}
  .gate-card .gi{width:54px;height:54px;border-radius:15px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin:0 auto 14px}
  .gate-card h2{font-size:18px;font-weight:800} .gate-card p{font-size:13px;color:var(--ink-2);margin-top:9px;line-height:1.65}
  .gate-card .ga{display:flex;flex-direction:column;gap:9px;margin-top:18px}
  .gate-card .ga .btn{justify-content:center;display:flex;align-items:center;gap:7px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#16223A;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:200;display:flex;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .cardimg-prev{margin:8px 0}.cardimg-prev img{max-width:100%;max-height:150px;border-radius:8px;border:1px solid var(--line);display:block}
  .cardimg-view{margin:12px 0}.cardimg-view img{max-width:100%;max-height:180px;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;display:block;transition:.15s}.cardimg-view img:hover{transform:scale(1.01);box-shadow:0 8px 20px rgba(22,34,58,.18)}
  .cardimg-dl{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:8px;padding:6px 12px}
</style>
<script src="../08_共用/theme.js"></script>
</head>
<body>
<div class="wrap" id="appWrap" style="display:none">
  <div class="topbar">
    <div class="logo" id="logo"></div>
    <div><b>名片系統</b><span class="en">CARD CRM</span></div>
    <div class="right">
      <div class="who"><span class="nm" id="whoNm"></span><span class="av" id="whoAv"></span></div>
      <a class="home-btn" href="../index.html"><span id="homeic"></span>回平台首頁</a>
    </div>
  </div>

  <div class="hero">
    <div class="k">客戶 / 名片管理</div>
    <h1>名片系統</h1>
    <p>整合自名片 CRM：建檔客戶名片、記錄每次拜訪訪談與合作意向、追蹤後續動作。可搜尋與依意向篩選。測試資料。</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search"><span id="searchic"></span><input id="q" placeholder="搜尋姓名 / 公司 / 職稱 / 電話 / Email…" oninput="render()"></div>
    <select class="sel" id="fIntent" onchange="render()">
      <option value="">全部意向</option><option value="高">合作意向 高</option><option value="中">合作意向 中</option><option value="低">合作意向 低</option><option value="未知">未知</option>
    </select>
    <button class="btn-add" onclick="openCardForm(0)"><span id="addic"></span>新增名片</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="foot"><span class="demo-flag">測試</span>　測試階段 · 使用測試資料，尚未接資料庫。整合自獨立「名片CRM」專案，OCR 名片辨識與語意搜尋接後端後啟用。</div>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<div class="gate" id="gate"><div class="gate-card">
  <div class="gi" id="gateic"></div>
  <h2>尚未開通名片系統</h2>
  <p>名片系統為選配功能，需由管理者於「功能控管」開通給你。請洽管理者，或以已開通的帳號登入。</p>
  <div class="ga"><a class="btn go" href="../index.html">回平台首頁</a></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="../08_共用/store.js"></script>
<script>
const IC={
  card:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M14 10h4M14 13.5h4M5 16c.6-1.6 2-2.5 3.5-2.5S11.4 14.4 12 16"/>',
  home:'<path d="M3.5 11.5 12 4.2l8.5 7.3M5.8 10v9.6h12.4V10"/>',
  plus:'<path d="M12 5.5v13M5.5 12h13"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  phone:'<path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 6.5 12 13l8.5-6.5"/>',
  pin:'<path d="M12 21s7-5.6 7-11a7 7 0 0 0-14 0c0 5.4 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/>',
  building:'<rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9 7h2M13 7h2M9 11h2M13 11h2M9 15h2M13 15h2"/>',
  scan:'<path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3M4 12h16"/>',
  arrow:'<path d="M5 12h13M13 6l6 6-6 6"/>',
  user:'<circle cx="12" cy="8" r="3.4"/><path d="M5.5 20c0-3.4 2.9-5.6 6.5-5.6s6.5 2.2 6.5 5.6"/>'
};
const ic=(n,s=18)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${IC[n]||IC.card}</svg>`;
document.getElementById("logo").innerHTML=ic("card",24);
document.getElementById("homeic").innerHTML=ic("home",15);
document.getElementById("addic").innerHTML=ic("plus",16);
document.getElementById("searchic").innerHTML=ic("search",16);
document.getElementById("gateic").innerHTML=ic("card",26);

const esc=EHub.esc;
const ME=EHub.getSession()||{name:"測試使用者",dept:"資訊部"};
document.getElementById("whoNm").textContent=ME.name;
document.getElementById("whoAv").textContent=ME.name[0];

const INTENT={"高":{c:"#0F8A72",bg:"#DCEFEA"},"中":{c:"#B7791F",bg:"#FBF1DD"},"低":{c:"#5C6B82",bg:"#EBEEF3"},"未知":{c:"#8A95AD",bg:"#F1F5FB"}};
const TYPES=["合作意向調查","基本拜訪","其他"];
let CARDS=EHub.loadCards(), INTV=EHub.loadIntv();
let nextC=CARDS.reduce((m,c)=>Math.max(m,c.id),0)+1;
let nextI=INTV.reduce((m,x)=>Math.max(m,x.id),0)+1;

function intvOf(cid){return INTV.filter(x=>x.cardId===cid).sort((a,b)=>(b.date<a.date?-1:b.date>a.date?1:b.id-a.id))}
function intentOf(cid){const l=intvOf(cid);const v=l.length?l[0].intent:"未知";return INTENT[v]?v:"未知"}

function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const fi=document.getElementById("fIntent").value;
  // 統計
  const counts={"高":0,"中":0,"低":0,"未知":0};CARDS.forEach(c=>counts[intentOf(c.id)]++);
  document.getElementById("stats").innerHTML=
    `<div class="stat"><span class="n">${CARDS.length}</span><span class="l">名片總數</span></div>`+
    ["高","中","低"].map(k=>`<div class="stat"><span class="dot" style="background:${INTENT[k].c}"></span><span class="n">${counts[k]}</span><span class="l">意向 ${k}</span></div>`).join("");
  // 列表
  let list=CARDS.slice();
  if(fi)list=list.filter(c=>intentOf(c.id)===fi);
  if(q)list=list.filter(c=>[c.name,c.company,c.title,c.phone,c.email].some(v=>(v||"").toLowerCase().includes(q)));
  list.sort((a,b)=>(b.createdAt<a.createdAt?-1:b.createdAt>a.createdAt?1:b.id-a.id));
  document.getElementById("grid").innerHTML=list.length?list.map(cardHTML).join(""):`<div class="empty" style="grid-column:1/-1">沒有符合的名片。</div>`;
}
function cardHTML(c){
  const it=intentOf(c.id),m=INTENT[it],n=intvOf(c.id).length;
  return `<div class="ccard" onclick="openCard(${c.id})">
    <div class="ch"><div class="cav">${esc(c.name?c.name[0]:"？")}</div><div><div class="cn">${esc(c.name||"（未填姓名）")}</div><div class="ct">${esc(c.title||"")}${c.title&&c.company?" · ":"" /* xss-ok */}${esc(c.company||"")}</div></div></div>
    <div class="ci">${c.phone?`<div>${ic("phone",14)}${esc(c.phone)}</div>`:""}${c.email?`<div>${ic("mail",14)}${esc(c.email)}</div>`:""}</div>
    <div class="cf"><span class="badge" style="color:${m.c};background:${m.bg}">合作意向 ${it}</span><span class="vcount">訪談 ${n} 次</span></div>
  </div>`;
}

/* ===== modal ===== */
const ov=document.getElementById("ov");
function closeModal(){ov.classList.remove("show");document.getElementById("modal").innerHTML=""}
ov.addEventListener("click",e=>{if(e.target===ov)closeModal()});
function showErr(m){const el=document.getElementById("err");if(el){el.textContent=m;el.classList.add("show")}}

function openCard(id){
  const c=CARDS.find(x=>x.id===id);if(!c)return;
  const it=intentOf(id),m=INTENT[it],ivs=intvOf(id);
  const info=[["phone",c.phone],["mail",c.email],["pin",c.address]].filter(x=>x[1]).map(x=>`<div class="il">${ic(x[0],16)} ${esc(x[1])}</div>`).join("");
  const ivHTML=ivs.length?ivs.map(v=>{const mi=INTENT[v.intent]||INTENT["未知"];return `<div class="intv"><button class="idel" onclick="delIntv(${v.id},${id})" title="刪除">×</button>
    <div class="ih"><span class="idate">${v.date}</span><span class="itype">${esc(v.type)}</span><span class="badge" style="color:${mi.c};background:${mi.bg}">意向 ${esc(v.intent)}</span><span class="istaff">${esc(v.staff)}</span></div>
    <div class="isum">${esc(v.summary)}</div>${v.next?`<div class="inext">${ic("arrow",13)} ${esc(v.next)}</div>`:""}</div>`}).join("") : `<div class="empty" style="padding:18px">尚無訪談紀錄。</div>`;
  document.getElementById("modal").innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0"><h3 style="padding:0">名片詳情</h3><span class="badge" style="color:${m.c};background:${m.bg}">合作意向 ${it}</span></div>
    <div class="detail-info" style="margin-top:14px"><div class="dav">${esc(c.name?c.name[0]:"？")}</div><div><div class="dn">${esc(c.name||"（未填姓名）")}</div><div class="dt">${esc(c.title||"")}${c.title&&c.company?" · ":"" /* xss-ok */}${esc(c.company||"")}</div></div></div>
    <div class="mbody">
      <div class="info-list">${info||'<div class="il" style="color:var(--ink-3)">（無聯絡資訊）</div>'}</div>
      ${c.img?`<div class="cardimg-view"><img src="${esc(c.img)}" onclick="EHub.lightbox(this.src)" title="點擊放大"><br><a class="cardimg-dl" href="${esc(c.img)}" download="名片_${esc(c.name||"card")}.jpg"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> 下載名片照片</a></div>`:""}
      <div class="sec-h"><span class="t">${ic("user",15)} 訪談紀錄（${ivs.length}）</span><button class="mini" onclick="openIntvForm(${id})">${ic("plus",14)} 新增訪談</button></div>
      ${ivHTML}
    </div>
    <div class="mfoot"><button class="btn danger spread" onclick="delCard(${id})">刪除名片</button><button class="btn ghost" onclick="openCardForm(${id})">編輯</button><button class="btn go" onclick="closeModal()">關閉</button></div>`;
  ov.classList.add("show");
}

function cardFormBody(c){return `
  <div class="err" id="err"></div>
  <label class="ocr">${ic("scan",18)} 上傳名片照片（存檔＋模擬辨識填入）<input type="file" accept="image/*" onchange="onCardImg(event)" style="display:none"></label>
  <div id="cardimg-prev" class="cardimg-prev">${(c&&c.img)?`<img src="${esc(c.img)}">`:""}</div>
  <div class="row2"><div class="fld"><label>姓名</label><input id="f-name" maxlength="20" value="${c?esc(c.name||""):""}"></div>
    <div class="fld"><label>公司</label><input id="f-company" maxlength="30" value="${c?esc(c.company||""):""}"></div></div>
  <div class="fld"><label>職稱</label><input id="f-title" maxlength="30" value="${c?esc(c.title||""):""}"></div>
  <div class="row2"><div class="fld"><label>電話</label><input id="f-phone" maxlength="24" value="${c?esc(c.phone||""):""}"></div>
    <div class="fld"><label>Email</label><input id="f-email" maxlength="40" value="${c?esc(c.email||""):""}"></div></div>
  <div class="fld"><label>地址</label><input id="f-address" maxlength="50" value="${c?esc(c.address||""):""}"></div>`}
let _cardImg=null;
function onCardImg(e){const f=e.target.files[0];e.target.value="";if(!f)return;_compCard(f,d=>{_cardImg=d;const p=document.getElementById("cardimg-prev");if(p)p.innerHTML='<img src="'+d+'">';mockOCR();});}
function _compCard(file,cb){const img=new Image(),u=URL.createObjectURL(file);img.onload=function(){URL.revokeObjectURL(u);var max=1100,w=img.width,h=img.height;if(w>max||h>max){var s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(c.toDataURL("image/jpeg",0.82));};img.onerror=function(){URL.revokeObjectURL(u);toast("圖片讀取失敗");};img.src=u;}
function openCardForm(id){
  const c=id?CARDS.find(x=>x.id===id):null; _cardImg=c?(c.img||null):null;
  document.getElementById("modal").innerHTML=`<h3>${id?"編輯名片":"新增名片"}</h3><div class="mbody">${cardFormBody(c)}</div>
    <div class="mfoot"><button class="btn ghost" onclick="${id?`openCard(${id})`:"closeModal()"}">取消</button><button class="btn go" onclick="saveCard(${id})">${id?"儲存":"新增"}</button></div>`;
  ov.classList.add("show");setTimeout(()=>document.getElementById("f-name").focus(),40);
}
function mockOCR(){
  const demo={name:"李冠霖",company:"鼎新電子",title:"專案經理",phone:"02-8765-4321",email:"klli@dingxin.com.tw",address:"桃園市中壢區中華路 12 號"};
  for(const k in demo){const el=document.getElementById("f-"+k);if(el&&!el.value)el.value=demo[k]}
  toast("已模擬辨識名片，請確認或修正內容");
}
function saveCard(id){
  const g=k=>document.getElementById("f-"+k).value.trim();
  const name=g("name");if(!name)return showErr("請至少填寫姓名。");
  const obj={name,company:g("company"),title:g("title"),phone:g("phone"),email:g("email"),address:g("address"),img:_cardImg};
  if(id){Object.assign(CARDS.find(x=>x.id===id),obj);EHub.saveCards(CARDS);toast("名片已更新");openCard(id)}
  else{const nc={id:nextC++,...obj,createdAt:EHub.ymd(EHub.today0())};CARDS.push(nc);EHub.saveCards(CARDS);toast("已新增名片");openCard(nc.id)}
  render();
}
function delCard(id){
  document.getElementById("modal").innerHTML=`<h3 style="padding-bottom:0">刪除名片？</h3><p style="padding:8px 20px 0;font-size:13.5px;color:var(--ink-2);line-height:1.6">將一併刪除此名片的所有訪談紀錄，無法復原。</p>
    <div class="mfoot"><button class="btn ghost" onclick="openCard(${id})">返回</button><button class="btn danger" onclick="doDelCard(${id})">確定刪除</button></div>`;
}
function doDelCard(id){CARDS=CARDS.filter(x=>x.id!==id);INTV=INTV.filter(x=>x.cardId!==id);EHub.saveCards(CARDS);EHub.saveIntv(INTV);closeModal();render();toast("名片已刪除")}

function openIntvForm(cid){
  document.getElementById("modal").innerHTML=`<h3>新增訪談紀錄</h3><div class="mbody">
    <div class="err" id="err"></div>
    <div class="row2"><div class="fld"><label>日期</label><input id="i-date" type="date" value="${EHub.ymd(EHub.today0())}"></div>
      <div class="fld"><label>拜訪人員</label><input id="i-staff" maxlength="20" value="${esc(ME.name)}"></div></div>
    <div class="row2"><div class="fld"><label>類型</label><select id="i-type">${TYPES.map(t=>`<option>${t}</option>`).join("")}</select></div>
      <div class="fld"><label>合作意向</label><select id="i-intent"><option>高</option><option selected>中</option><option>低</option><option>未知</option></select></div></div>
    <div class="fld"><label>訪談摘要</label><textarea id="i-sum" maxlength="200" placeholder="這次拜訪談了什麼…"></textarea></div>
    <div class="fld"><label>下一步行動（選填）</label><input id="i-next" maxlength="40" placeholder="例：下週寄報價單"></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="openCard(${cid})">取消</button><button class="btn go" onclick="saveIntv(${cid})">新增</button></div>`;
  ov.classList.add("show");setTimeout(()=>document.getElementById("i-sum").focus(),40);
}
function saveIntv(cid){
  const date=document.getElementById("i-date").value, staff=document.getElementById("i-staff").value.trim();
  const type=document.getElementById("i-type").value, intent=document.getElementById("i-intent").value;
  const summary=document.getElementById("i-sum").value.trim(), next=document.getElementById("i-next").value.trim();
  if(!date)return showErr("請選擇日期。");
  if(!staff)return showErr("請填寫拜訪人員。");
  if(!summary)return showErr("請填寫訪談摘要。");
  INTV.push({id:nextI++,cardId:cid,date,staff,type,summary,intent,next});
  EHub.saveIntv(INTV);render();openCard(cid);toast("已新增訪談紀錄");
}
function delIntv(id,cid){INTV=INTV.filter(x=>x.id!==id);EHub.saveIntv(INTV);render();openCard(cid);toast("已刪除訪談")}

let tt;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2400)}

/* 授權 gate：未開通則擋下（撤權/授權即時反映）*/
function applyAccess(){
  const ok=EHub.canAccess(ME.name,"namecard");
  document.getElementById("appWrap").style.display=ok?"":"none";
  document.getElementById("gate").classList.toggle("show",!ok);
  if(ok)render(); else closeModal();
}
applyAccess();
window.addEventListener("storage",e=>{
  if(e.key===EHub.CARD_KEY){CARDS=EHub.loadCards();nextC=CARDS.reduce((m,c)=>Math.max(m,c.id),0)+1;if(EHub.canAccess(ME.name,"namecard"))render()}
  if(e.key===EHub.INTV_KEY){INTV=EHub.loadIntv();nextI=INTV.reduce((m,x)=>Math.max(m,x.id),0)+1;if(EHub.canAccess(ME.name,"namecard"))render()}
  if(e.key===EHub.ACCESS_KEY)applyAccess();
});
</script>
</body>
</html>
