<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簽呈通 e-Signoff — 前端 Demo（MVP）</title>
<style>
  :root{
    /* 淺色科技版：冷調淺底(非純白) + 工具主色=靛紫 + 藍配色 + 微發光/網點 */
    --bg:#EEF1F7; --surface:#FFFFFF; --surface-2:#F4F6FB;
    --ink:#1B2230; --ink-2:#5C6577; --ink-3:#8A93A6;
    --line:#E2E6EF; --line-2:#EDEFF5;
    --accent:#6D54C8; --accent-ink:#5840A8; --accent-soft:#ECE9FB;
    --s-open:#2563A8;     --s-open-bg:#E5EFF8;
    --s-progress:#B7791F; --s-progress-bg:#FBF1DD;
    --s-appr:#5B4B8A;     --s-appr-bg:#ECE9F6;
    --s-need:#C2603B;     --s-need-bg:#FAE8DF;
    --s-resolved:#2F8F5B; --s-resolved-bg:#E4F1E9;
    --s-closed:#5C6B82;   --s-closed-bg:#EBEEF3;
    --danger:#C0392B;     --danger-bg:#F8E7E4;
    --r:12px; --r-sm:8px; --r-lg:16px;
    --sh-1:0 1px 2px rgba(27,34,48,.05);
    --sh-2:0 14px 34px rgba(40,55,90,.13), 0 2px 8px rgba(40,55,90,.07);
    --glow:0 8px 22px rgba(109,84,200,.30);
    --gridc:rgba(40,55,90,.05);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(var(--gridc) 1px, transparent 1px) 0 0/22px 22px,
      radial-gradient(680px 440px at 90% -8%, rgba(109,84,200,.08), transparent 60%),
      radial-gradient(620px 420px at -6% 4%, rgba(37,99,168,.06), transparent 62%),
      var(--bg);
    background-attachment:fixed;
    background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  input::placeholder,textarea::placeholder{color:var(--ink-3)}
  .mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:11px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none} svg{display:block}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  .layout{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

  .sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px;border-bottom:1px solid var(--line-2)}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;flex:none;box-shadow:var(--glow)}
  .brand b{font-size:16px} .brand .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.18em;font-family:var(--mono)}
  .nav{padding:14px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav .lbl{font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;font-size:10px;color:var(--ink-3);padding:12px 12px 6px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);color:var(--ink-2);font-weight:500;transition:.15s}
  .nav a:hover{background:var(--surface-2);color:var(--ink)} .nav a.active{background:var(--accent-soft);color:var(--accent-ink)}
  .nav a .ic{color:currentColor;flex:none}
  .nav a .count{margin-left:auto;font-size:12px;background:var(--surface-2);color:var(--ink-2);padding:1px 8px;border-radius:999px;font-weight:600}
  .nav a.active .count{background:var(--surface);color:var(--accent-ink)} .nav a .count.hot{background:var(--danger);color:#fff}
  .userbox{border-top:1px solid var(--line-2);padding:14px 12px}
  .ucard{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);background:var(--surface-2)}
  .ucard .av{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;flex:none;font-size:14px}
  .ucard .nm{font-weight:600;font-size:13px;line-height:1.2} .ucard .rl{font-size:11px;color:var(--ink-2)}
  .ucard .logout{margin-left:auto;color:var(--ink-3);padding:4px} .ucard .logout:hover{color:var(--danger)}
  .role-pick{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--ink-3);padding:4px 8px 2px;text-transform:uppercase}
  .demo-sw{width:100%;font-family:inherit;font-size:12px;color:var(--ink);border:1px solid var(--line);background:var(--surface-2);border-radius:6px;padding:6px 8px;margin-top:6px;cursor:pointer}

  .main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;flex:none;z-index:20;position:relative}
  .topbar h1{font-size:17px;font-weight:700}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:none;border:none;border-bottom:1.5px solid var(--line);border-radius:0;padding:6px 2px;width:240px;color:var(--ink-3);transition:border-color .15s}
  .search:focus-within{border-bottom-color:var(--accent)}
  .search input{border:none;background:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink);width:100%}
  .iconbtn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--ink-2);position:relative}
  .iconbtn:hover{background:var(--surface-2);color:var(--ink)}
  .iconbtn .badge-n{position:absolute;top:4px;right:4px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--surface)}
  .content{padding:26px 28px 48px;max-width:1180px;width:100%;margin:0 auto;flex:1;overflow-y:auto}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}
  .pagehead .k{font-family:var(--mono);color:var(--accent);font-size:11px;letter-spacing:.18em;margin-bottom:6px}
  .pagehead h2{font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .pagehead p{color:var(--ink-2);margin-top:5px;font-size:13.5px}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-sm);font-weight:600;font-size:13.5px;transition:.15s;border:1px solid transparent}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(109,84,200,.32)} .btn-primary:hover{background:#5840A8;box-shadow:0 8px 22px rgba(109,84,200,.45)}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border-color:var(--line)} .btn-ghost:hover{border-color:var(--ink-3)}
  .btn-danger,.btn.danger{background:rgba(192,57,43,.14);color:#d9534f;border:1px solid rgba(192,57,43,.34)} .btn-danger:hover,.btn.danger:hover{background:rgba(192,57,43,.24)}
  .btn-sm{padding:6px 12px;font-size:12.5px} .btn:disabled{opacity:.45;cursor:not-allowed}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1)}
  .card-h{padding:16px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .card-h h3{font-size:14.5px;font-weight:700} .card-h .mono{color:var(--ink-3);margin-left:auto}
  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--ink-2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--ink)} .tab.active{color:var(--accent-ink);border-bottom-color:var(--accent)}
  .tab .count{font-size:11.5px;background:var(--surface-2);padding:0 7px;border-radius:999px;color:var(--ink-2)} .tab.active .count{background:var(--accent-soft);color:var(--accent-ink)}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .selwrap{position:relative}
  select.filter{appearance:none;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 30px 8px 13px;cursor:pointer}
  .selwrap::after{content:"";position:absolute;right:12px;top:50%;width:7px;height:7px;border-right:2px solid var(--ink-3);border-bottom:2px solid var(--ink-3);transform:translateY(-70%) rotate(45deg);pointer-events:none}

  .ttable{width:100%;border-collapse:collapse}
  .ttable thead th{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink-3);text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);font-weight:600;background:var(--surface-2)}
  .ttable tbody tr{border-bottom:1px solid var(--line-2);transition:.12s;cursor:pointer} .ttable tbody tr:last-child{border-bottom:none}
  .ttable tbody tr:hover{background:var(--surface-2)} .ttable td{padding:12px 16px;vertical-align:middle}
  .row-me td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
  .t-no{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.05em}
  .t-title{font-weight:600;color:var(--ink);font-size:13.5px} .t-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .who{display:flex;align-items:center;gap:8px}
  .who .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex:none}
  .who .nm{font-size:12.5px;font-weight:500} .who .dp{font-size:11px;color:var(--ink-3)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .ball{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-2);white-space:nowrap}
  .ball.me{background:var(--accent-soft);color:var(--accent-ink)}
  .prog{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .prog .pbar{width:60px;height:6px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .prog .pfill{height:100%;background:var(--s-resolved);border-radius:999px}
  .empty{padding:54px 20px;text-align:center;color:var(--ink-3)} .empty .ic{margin:0 auto 12px;opacity:.5}

  .detail-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;align-items:start}
  .d-head{padding:22px 24px;border-bottom:1px solid var(--line-2)}
  .d-head .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .d-head h2{font-size:21px;font-weight:800;line-height:1.25}
  .d-meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:16px}
  .d-meta .it .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-3);margin-bottom:4px}
  .d-body{padding:20px 24px}
  .d-body .sec-l{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-3);margin-bottom:9px;margin-top:18px}
  .d-body .sec-l:first-child{margin-top:0}
  .d-desc{color:var(--ink);line-height:1.7;font-size:14px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:15px 17px;white-space:pre-wrap}
  /* 會簽進度 */
  .signers{display:flex;flex-direction:column;gap:8px}
  .signer{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2)}
  .signer.me{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .signer .av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12.5px;flex:none}
  .signer .nm{font-weight:600;font-size:13px} .signer .role-tag{font-size:11px;color:var(--ink-3)}
  .signer .st{margin-left:auto;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink)}

  .timeline{padding:6px 24px 22px;position:relative}
  .tl-item{display:grid;grid-template-columns:34px 1fr;gap:13px;padding-bottom:18px;position:relative}
  .tl-item:not(:last-child)::before{content:"";position:absolute;left:16px;top:32px;bottom:0;width:2px;background:var(--line-2)}
  .tl-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:none;z-index:1;background:var(--surface-2);border:1px solid var(--line)}
  .tl-body .h{font-size:13px}.tl-body .h b{font-weight:700} .tl-body .tm{font-size:11px;color:var(--ink-3);margin-top:2px}
  .tl-comment{margin-top:7px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;border-top-left-radius:2px;padding:9px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap}
  .tl-comment.suggest{border-left:3px solid var(--s-progress)} .tl-comment.reason{border-left:3px solid var(--s-need)}
  .tl-atts{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
  .commentbox{padding:14px 24px;border-top:1px solid var(--line-2)}
  .commentbox .row{display:flex;gap:10px}
  .commentbox textarea{flex:1;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-family:inherit;font-size:13.5px;resize:vertical;min-height:42px;outline:none;background:var(--surface-2);color:var(--ink)}
  .commentbox textarea:focus{border-color:var(--accent)}

  .side .card-h{padding:14px 18px}
  .side-sec{padding:16px 18px;border-bottom:1px solid var(--line-2)} .side-sec:last-child{border-bottom:none}
  .side-sec .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-3);margin-bottom:10px}
  .actcol{display:flex;flex-direction:column;gap:8px} .actcol .btn{justify-content:flex-start;width:100%}

  .form-card{max-width:680px}
  .field{padding:0 24px 18px} .field:first-of-type{padding-top:22px}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:7px} .field label .req{color:var(--danger);margin-left:3px}
  .field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px;outline:none;background:var(--surface-2)}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:96px;line-height:1.6} .field .hint{font-size:11.5px;color:var(--ink-3);margin-top:5px}
  .readonly-field{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px 13px}
  .readonly-field .ro-tag{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--ink-3);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .picker{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pk{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;cursor:pointer;transition:.12s;background:var(--surface-2)}
  .pk:hover{border-color:var(--ink-3)} .pk.on{border-color:var(--accent);background:var(--accent-soft)}
  .pk input{width:auto;flex:none} .pk .nm{font-weight:600;font-size:13px} .pk .dp{font-size:11px;color:var(--ink-3)}
  .form-foot{padding:18px 24px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end}
  .dropzone{border:1.5px dashed var(--line);border-radius:var(--r-sm);padding:18px;text-align:center;cursor:pointer;transition:.15s;color:var(--ink-2);background:var(--surface-2)}
  .dropzone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)} .dropzone .t{font-weight:600;font-size:13px} .dropzone .s{font-size:11.5px;color:var(--ink-3);margin-top:3px}
  .filelist{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .fileitem{display:flex;align-items:center;gap:11px;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2)}
  .fileitem .thumb{width:38px;height:38px;border-radius:7px;overflow:hidden;flex:none;display:grid;place-items:center;background:var(--surface);color:var(--ink-2)} .fileitem .thumb img{width:100%;height:100%;object-fit:cover}
  .fileitem .meta{flex:1;min-width:0} .fileitem .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .fileitem .sz{font-size:11px;color:var(--ink-3)}
  .fileitem .rm{color:var(--ink-3);padding:4px} .fileitem .rm:hover{color:var(--danger)}
  .att-grid{display:flex;flex-wrap:wrap;gap:12px}
  .att{display:flex;align-items:center;gap:10px;padding:9px 13px 9px 9px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);min-width:200px}
  .att .thumb{width:42px;height:42px;border-radius:7px;flex:none;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent-ink);overflow:hidden} .att .thumb img{width:100%;height:100%;object-fit:cover}
  .att .nm{font-size:13px;font-weight:600;line-height:1.25} .att .sz{font-size:11px;color:var(--ink-3)} .att.mini{min-width:0;padding:5px 10px 5px 7px;gap:7px} .att.mini .thumb{width:26px;height:26px}

  .modal-ov{position:fixed;inset:0;background:rgba(27,34,48,.46);z-index:200;display:grid;place-items:center;padding:20px;animation:mfade .15s ease}
  .modal-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2);padding:22px 22px 18px;animation:mpop .18s ease}
  .modal-title{font-size:16px;font-weight:800;margin-bottom:6px} .modal-msg{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-bottom:14px}
  .modal-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:8px 0 7px}
  .modal-input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;outline:none;margin-bottom:4px}
  .modal-input:focus{border-color:var(--accent)} textarea.modal-input{resize:vertical;min-height:74px;line-height:1.6}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  .modal-info{max-height:52vh;overflow-y:auto;margin-top:4px}
  .diff-block{margin-bottom:16px} .diff-block:last-child{margin-bottom:0}
  .diff-l{font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:7px}
  .diff-row{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start}
  .diff-tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;flex:none;margin-top:2px}
  .diff-tag.old{background:var(--danger-bg);color:var(--danger)} .diff-tag.new{background:var(--s-resolved-bg);color:var(--s-resolved)}
  .diff-txt{font-size:13px;line-height:1.65;white-space:pre-wrap;flex:1;background:var(--surface-2);border:1px solid var(--line-2);border-radius:6px;padding:8px 11px}
  .linklike{color:var(--accent-ink);font-weight:600;font-size:12.5px;display:inline-flex;align-items:center;gap:4px;text-decoration:underline;text-underline-offset:2px} .linklike:hover{color:var(--accent)}
  @keyframes mfade{from{opacity:0}to{opacity:1}} @keyframes mpop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#16223A;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:210;display:flex;align-items:center;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .demo-flag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--s-progress);background:var(--s-progress-bg);padding:2px 9px;border-radius:999px;font-weight:600}

function mySigner(d){return d.signers.find(s=>s.uid===state.user.id)}
function isDecider(d){return d.decider.uid===state.user.id}
function isShared(d){return (d.shares||[]).some(s=>s.to===state.user.id)}

/* 球在我手上：會簽待簽 / 決策待核定 */
function ballOnMe(d){const st=docStatus(d);if(st!=="circulating")return st==="returned"&&isOrigin(d);
  const ms=mySigner(d);if(ms&&ms.st==="pending")return true;
  if(isDecider(d)&&d.decider.st==="pending")return true;
  if(state.user.id==="admin")return false;return false}
/* 把「待我簽核」數即時寫進共用紅點層(ehub_badges_v2.signoff),首頁即時撈、隨操作更新。
   uid 版 ballOnMe,算全部人 → 登入任何帳號首頁都準。 */
function ballOnUid(d,uid){const st=docStatus(d);if(st!=="circulating")return st==="returned"&&d.originId===uid;
  var ms=d.signers.find(function(s){return s.uid===uid});if(ms&&ms.st==="pending")return true;
  if(d.decider.uid===uid&&d.decider.st==="pending")return true;return false}
function syncSignoffBadges(){try{var EH=window.EHub;if(!EH||!EH.loadBadges)return;var cnt={};DOCS.forEach(function(d){for(var uid in USERS){if(uid==="admin")continue;if(ballOnUid(d,uid))cnt[uid]=(cnt[uid]||0)+1}});var m=EH.loadBadges();for(var nm in m){if(m[nm]&&m[nm].signoff!=null)delete m[nm].signoff}for(var u in cnt){var n2=USERS[u]&&USERS[u].name;if(!n2)continue;if(!m[n2])m[n2]={};m[n2].signoff=cnt[u]}EH.saveBadges(m)}catch(e){}}
function ballText(d){const st=docStatus(d);
  if(st==="passed")return "已通過";if(st==="withdrawn")return "已撤回";
  if(st==="returned")return USERS[d.originId].name+" 重擬";
  const waitSign=d.signers.filter(s=>s.st==="pending").map(s=>USERS[s.uid].name);
  const parts=[];if(waitSign.length)parts.push("會簽:"+waitSign.join("、"));
  if(d.decider.st==="pending")parts.push("決策:"+USERS[d.decider.uid].name);
  return parts.join(" · ")||"—"}

/* ===== in-page modal（取代 native）===== */
function openModal({title,message,field,okText="確定",cancelText="取消",danger}){
  return new Promise(resolve=>{const host=document.getElementById("modal");let fh="";
    if(field){if(field.type==="textarea")fh=`<textarea class="modal-input" id="modal-in" rows="3" placeholder="${field.placeholder||""}"></textarea>`;
      else if(field.type==="select")fh=`<select class="modal-input" id="modal-in">${field.options.map(o=>`<option value="${o.value}">${o.label}</option>`).join("")}</select>`;
      else fh=`<input class="modal-input" id="modal-in" placeholder="${field.placeholder||""}">`;}
    const wf=field&&field.files;const fHTML=wf?`<div class="filelist" id="modal-files" style="margin-top:10px"></div><button type="button" class="btn btn-ghost btn-sm" id="modal-attach" style="margin-top:8px">${ic("attach",14)}附加檔案</button><input type="file" id="modal-file" multiple style="display:none">`:"";
    host.innerHTML=`<div class="modal-ov" id="modal-ov"><div class="modal-card"><div class="modal-title">${title}</div>${message?`<div class="modal-msg">${message}</div>`:""}${field&&field.label?`<label class="modal-label">${field.label}</label>`:""}${fh}${fHTML}<div class="modal-foot"><button class="btn btn-ghost" id="modal-cc">${cancelText}</button><button class="btn btn-${danger?"danger":"primary"}" id="modal-ok">${okText}</button></div></div></div>`;
    const inp=document.getElementById("modal-in");const mfiles=[];const close=v=>{document.onkeydown=null;host.innerHTML="";resolve(v)};
    if(inp)setTimeout(()=>inp.focus(),20);
    if(wf){const fl=document.getElementById("modal-files");const rf=()=>fl.innerHTML=mfiles.map((f,i)=>`<div class="fileitem"><div class="thumb">${(f.data||f.url)&&f.isImg?`<img src="${f.data||f.url}">`:ic(f.isImg?"image":"file",18)}</div><div class="meta"><div class="nm">${esc(f.name)}</div><div class="sz">${f.size}</div></div><button class="rm" onclick="this.parentNode.remove();window.__mfrm&&window.__mfrm(${i})">${ic("xCircle",18)}</button></div>`).join("");
      window.__mfrm=i=>{mfiles.splice(i,1);rf()};document.getElementById("modal-attach").onclick=()=>document.getElementById("modal-file").click();
      document.getElementById("modal-file").onchange=e=>{EHub.readFiles(e.target.files,function(arr){arr.forEach(f=>mfiles.push(f));rf()});e.target.value=""};}
    document.getElementById("modal-ok").onclick=()=>{if(!field)return close(true);const v=field.type==="select"?inp.value:(inp.value||"").trim();if(field.required&&!v&&!mfiles.length){inp.style.borderColor="var(--danger)";inp.focus();return}close(wf?{text:v,files:mfiles}:v)};
    document.getElementById("modal-cc").onclick=()=>close(field?null:false);
    document.getElementById("modal-ov").onclick=e=>{if(e.target.id==="modal-ov")close(field?null:false)};
    document.onkeydown=e=>{if(e.key==="Escape")close(field?null:false)};});
}

async function signApprove(id){const d=D(id);const s=mySigner(d);

  if(!d.decider.uid&&d.signers.every(x=>x.st==="approved"))notify(d.originId,`簽呈已全部會簽通過：${d.title}`,id);
  toast("已核准會簽");render()}
async function suggestChange(id){const d=D(id);const r=await mArea("發起修改建議","你建議修改的內容（只記錄、不擋其他人簽核）",true);if(!r)return;
  ev(d,"suggest",{text:r});touch(d);notify(d.originId,`${state.user.name} 對「${d.title}」提出修改建議`,id);notify(d.decider.uid,`收到修改建議：${d.title}`,id);toast("已送出修改建議");render()}

  d.decider.st="approved";d.decider.opinion=op;ev(d,"decided_pass",{opinion:op});touch(d);
  notify(d.originId,`簽呈已核准通過：${d.title}`,id);d.signers.forEach(s=>notify(s.uid,`簽呈已核准通過：${d.title}`,id));toast("已核准通過");render()}
async function deciderReturn(id){const d=D(id);const r=await mArea("退回重擬","退回原因（必填）",true);if(!r)return;
  d.decider.st="returned";ev(d,"decided_return",{reason:r});touch(d);
  notify(d.originId,`簽呈被退回重擬：${d.title}`,id);toast("已退回發起人重擬");render()}
async function shareDoc(id){const d=D(id);const cands=Object.values(USERS).filter(u=>u.id!==state.user.id&&u.id!=="admin").map(u=>({value:u.id,label:u.name+"（"+u.dept+"）"}));
  const to=await mSelect("分享給他人檢閱","選擇對象（對方只能檢閱、不能修改/簽核）",cands);if(!to)return;
  if(!d.shares)d.shares=[];if(d.shares.some(s=>s.to===to)){toast("已分享給此人","warn");return}
  d.shares.push({by:state.user.id,to,at:now()});ev(d,"shared",{to});touch(d);notify(to,`${state.user.name} 分享簽呈給你檢閱：${d.title}`,id);toast("已分享給 "+USERS[to].name+"（唯讀）");render()}
async function withdrawDoc(id){const d=D(id);const ok=await mConfirm("撤回簽呈","確定撤回此簽呈？撤回後即結束，需重新發起。",true);if(!ok)return;

/* who can edit/act */
function docActions(d){const u=state.user,A=[],st=docStatus(d);const a=(label,icon,fn,style)=>A.push({label,icon,fn,style});
  if(st==="circulating"){
    const s=mySigner(d);
    if(s&&s.st==="pending"){a("會簽核准","checkLn",()=>signApprove(d.id),"primary");a("發起修改建議","flag",()=>suggestChange(d.id),"ghost")}
    if(isDecider(d)&&d.decider.st==="pending"){a("核准通過 · 核定","shield",()=>deciderPass(d.id),"primary");a("退回重擬","back",()=>deciderReturn(d.id),"danger")}
    if(isOrigin(d))a("撤回簽呈","back",()=>withdrawDoc(d.id),"danger");
    // 分享：簽核人/決策者皆可
    if(s||isDecider(d)||isOrigin(d))a("分享給他人檢閱","share",()=>shareDoc(d.id),"ghost");
  }
  if(st==="passed"&&(isDecider(d)||u.id==="admin"))a("結案（已執行完成）","checkLn",()=>closeDoc(d.id),"primary");
  if(st==="returned"&&isOrigin(d))a("修改後重送","reply",()=>resubmitDoc(d.id),"primary");
  return A}

function tabsFor(){const u=state.user;

  T.push({l:"分享給我",f:d=>isShared(d)});
  T.push({l:"全部",f:()=>true});

function viewDetail(id){const d=D(id);if(!d)return `<div class="empty">找不到簽呈</div>`;

        <div class="sec-l">要執行的項目 / 說明</div><div class="d-desc">${esc(d.content)}</div>

      </div>
      <div class="card-h" style="border-top:1px solid var(--line-2)">${ic("time",18)}<h3>簽核時間軸</h3><span class="mono">${evs.length} 筆紀錄</span></div>
      <div class="timeline">${evs.map(evHTML).join("")}</div>
      ${st==="circulating"&&!readonly?`<div class="commentbox"><div class="row"><textarea id="cmt" placeholder="留言 / 建議…"></textarea><button class="btn btn-primary" onclick="addComment('${d.id}')">${ic("send",16)}送出</button></div></div>`:""}
    </div>
    <div class="card side">
      <div class="card-h"><h3>操作</h3></div>
      ${acts.length?`<div class="side-sec"><div class="k">${roleLabel(state.user)==="最終決策者"&&isDecider(d)?"決策者":mySigner(d)?"會簽人":"發起人"}</div><div class="actcol">${acts.map(a=>`<button class="btn btn-${a.style}" onclick="${reg(a.fn)}">${ic(a.icon,16)}${a.label}</button>`).join("")}</div></div>`
        :`<div class="side-sec"><div class="k">操作</div><div style="font-size:12.5px;color:var(--ink-3)">${readonly?"你是檢閱人，僅能查看。":"目前無可執行動作。"}</div></div>`}

        <div class="who" style="margin-bottom:8px">${avatar(d.originId)}<div><div class="nm">${USERS[d.originId].name}</div><div class="dp">發起人 · ${d.originDept}</div></div></div>

function evHTML(e){const u=USERS[e.by]||{name:"系統"};const x=e.x||{};let txt="",extra="",cls="";const nm=`<b>${u.name}</b>`;
  switch(e.t){
    case "created":txt=`${nm} 發起簽呈，會簽 ${(x.signers||[]).map(s=>USERS[s].name).join("、")}${x.decider?`，決策者 <b>${USERS[x.decider].name}</b>`:"（全部會簽即通過）"}`;break;
    case "signed":txt=`${nm} 會簽核准`;if(x.opinion)extra=x.opinion;break;
    case "suggest":txt=`${nm} 發起修改建議`;extra=x.text;cls="suggest";break;
    case "decided_pass":txt=`${nm} 核准通過（核定）`;if(x.opinion)extra=x.opinion;break;
    case "decided_return":txt=`${nm} 退回重擬`;extra=x.reason;cls="reason";break;
    case "shared":txt=`${nm} 分享給 <b>${USERS[x.to].name}</b> 檢閱（唯讀）`;break;
    case "closed":txt=`${nm} 結案（已執行完成）`;if(x.note)extra=esc(x.note);break;
    case "withdrawn":txt=`${nm} 撤回簽呈`;break;
    case "resubmitted":{txt=`${nm} 修改後重送（會簽重置）`;const parts=[];
      (x.fields||[]).forEach(f=>parts.push(`<b>${esc(f.label)}</b> ${esc(f.from)} → ${esc(f.to)}`));
      if((x.content||[]).length){const lk=reg(()=>showEditContent(x.content));parts.push(`<button class="linklike" onclick="${lk}">${ic("search",12)}查看內容修改</button>`);}
      extra=parts.length?parts.join("　·　"):"（重新送出，內容未變動）";break;}
    case "edited":txt=`${nm} 編輯簽呈內容`;break;
    default:txt=`${nm} 留言`;if(x.text)extra=esc(x.text);
  }
  const body=extra?`<div class="tl-comment ${cls}">${extra}</div>`:"";
  const atts=(x.atts&&x.atts.length)?`<div class="tl-atts">${x.atts.map(a=>attHTML(a,true)).join("")}</div>`:"";
  return `<div class="tl-item"><div class="tl-dot">${ic(EVENT[e.t]||"send",16)}</div><div class="tl-body"><div class="h">${txt}</div><div class="tm">${fmt(e.at)} · ${rel(e.at)}</div>${body}${atts}</div></div>`}

function viewNew(){const editing=!!state.editingId;
  return `
  <a href="#/${editing?"d/"+state.editingId:"docs"}" class="btn btn-ghost btn-sm" style="margin-bottom:16px">${ic("arrowL",16)}${editing?"返回簽呈":"返回列表"}</a>
  <div class="pagehead"><div><div class="k">${editing?"修改重送":"發起"}</div><h2>${editing?"修改簽呈（重送會重置會簽）":"發起簽呈"}</h2><p>指定會簽人（平行會簽）+ 最終決策者；無時效不計時</p></div></div>
  <div class="card form-card">
    <div class="field"><label>主旨<span class="req">*</span></label><input id="f-title" placeholder="一句話描述要執行的項目" value="${(draft.title||"").replace(/"/g,"&quot;")}"></div>

    <div class="field"><label>要執行的項目 / 說明<span class="req">*</span></label><textarea id="f-content" placeholder="說明要做什麼、為什麼、影響、預算…">${draft.content||""}</textarea></div>

      <div class="picker">${SIGNER_POOL.filter(uid=>uid!==state.user.id).map(uid=>`<label class="pk ${draft.signers.includes(uid)?"on":""}" onclick="toggleSigner('${uid}',this)"><input type="checkbox" ${draft.signers.includes(uid)?"checked":""} onclick="event.preventDefault()"><div><div class="nm">${USERS[uid].name}</div><div class="dp">${USERS[uid].dept}</div></div></label>`).join("")}</div>

      <div class="hint">指定時，唯一能「核准通過 / 退回重擬」的人；不指定則全部會簽完成即自動通過。</div></div>

      <div class="dropzone" onclick="document.getElementById('f-file').click()">${ic("attach",22)}<div class="t">點此選擇圖片 / 文件</div><div class="s">可多選</div></div>
      <input type="file" id="f-file" multiple style="display:none" onchange="onPickFiles(this)"><div class="filelist" id="filelist">${draft.files.map(fileItemHTML).join("")}</div>

  </div>`}
function fileItemHTML(f,i){return `<div class="fileitem"><div class="thumb">${(f.data||f.url)&&f.isImg?`<img src="${f.data||f.url}">`:ic(f.isImg?"image":"file",18)}</div><div class="meta"><div class="nm">${esc(f.name)}</div><div class="sz">${f.size}</div></div><button class="rm" onclick="removeFile(${i})">${ic("xCircle",18)}</button></div>`}
function toggleSigner(uid,el){const i=draft.signers.indexOf(uid);const on=i<0;if(on)draft.signers.push(uid);else draft.signers.splice(i,1);if(el){el.classList.toggle("on",on);const cb=el.querySelector("input");if(cb)cb.checked=on;}}
function onPickFiles(input){EHub.readFiles(input.files,function(arr){arr.forEach(f=>draft.files.push(f));document.getElementById("filelist").innerHTML=draft.files.map(fileItemHTML).join("")});input.value=""}
function removeFile(i){draft.files.splice(i,1);document.getElementById("filelist").innerHTML=draft.files.map(fileItemHTML).join("")}
function onCmtFiles(input){EHub.readFiles(input.files,function(arr){arr.forEach(f=>cmtFiles.push(f))});input.value=""}
function submitDoc(){const title=document.getElementById("f-title").value.trim();const content=document.getElementById("f-content").value.trim();
  draft.decider=document.getElementById("f-decider").value;
  if(!title){toast("請填主旨","warn");return}if(!content){toast("請填說明","warn");return}
  if(!draft.signers.length){toast("請至少指定一位會簽人","warn");return}
  if(state.editingId){const d=D(state.editingId);
    const oldS=d.signers.map(s=>s.uid),oldDec=d.decider.uid,oldAtt=(d.attachments||[]).map(a=>a.name).join("|");
    const newAtt=draft.files.map(a=>a.name).join("|");
    const fieldCh=[],contentCh=[];
    if(d.title!==title)contentCh.push({label:"主旨",from:d.title,to:title});
    if(d.content!==content)contentCh.push({label:"說明 / 要執行項目",from:d.content,to:content});
    if(oldDec!==draft.decider)fieldCh.push({label:"最終決策者",from:(oldDec?USERS[oldDec].name:"未指定"),to:(draft.decider?USERS[draft.decider].name:"未指定")});
    if(oldS.join(",")!==draft.signers.join(","))fieldCh.push({label:"會簽人",from:(oldS.map(u=>USERS[u].name).join("、")||"無"),to:(draft.signers.map(u=>USERS[u].name).join("、")||"無")});
    if(oldAtt!==newAtt)fieldCh.push({label:"附件",from:(d.attachments||[]).length+" 個",to:draft.files.length+" 個（已更新）"});
    d.title=title;d.content=content;d.attachments=draft.files.slice();
    d.signers=draft.signers.map(uid=>({uid,st:"pending",opinion:""}));d.decider={uid:draft.decider,st:draft.decider?"pending":"none",opinion:""};d.withdrawn=false;d.closed=false;
    ev(d,"resubmitted",{fields:fieldCh,content:contentCh});touch(d);
    d.signers.forEach(s=>notify(s.uid,`簽呈修改後重送，請重新會簽：${title}`,d.id));notify(draft.decider,`簽呈修改後重送：${title}`,d.id);
    const eid=state.editingId;state.editingId=null;draft={title:"",content:"",signers:[],decider:"gm",files:[]};toast("已修改重送（會簽重置）");go("#/d/"+eid);return}
  const id="n"+now();const dt=new Date();const p=n=>String(n).padStart(2,"0");
  const d={id,no:`SP-${dt.getFullYear()}${p(dt.getMonth()+1)}${p(dt.getDate())}-${String(42+DOCS.length).padStart(3,"0")}`,
    title,content,originId:state.user.id,originDept:state.user.dept,
    signers:draft.signers.map(uid=>({uid,st:"pending",opinion:""})),decider:{uid:draft.decider,st:draft.decider?"pending":"none",opinion:""},
    shares:[],withdrawn:false,closed:false,attachments:draft.files.slice(),created:now(),updated:now(),
    events:[{t:"created",by:state.user.id,at:now(),x:{signers:draft.signers.slice(),decider:draft.decider}}]};
  DOCS.unshift(d);draft.signers.forEach(uid=>notify(uid,`邀請你會簽：${title}`,id));notify(draft.decider,`待你核定：${title}`,id);
  draft={title:"",content:"",signers:[],decider:"gm",files:[]};toast("已送出會簽");go("#/d/"+id)}

    <div class="login-field"><label>以哪個角色登入（測試）</label><select id="login-role">${DEMO_ROLES.map(id=>`<option value="${id}">${roleLabel(USERS[id])} — ${USERS[id].name}（${USERS[id].dept}）</option>`).join("")}</select></div>
    <button class="btn btn-primary" onclick="login()">${ic("logout",17)}進入系統</button>
    <div class="login-note">測試階段 · 使用測試資料，尚未接資料庫。<br>切換角色可看發起人 / 會簽人 / 決策者不同視角。</div>
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;margin-top:14px;font-size:12.5px;color:var(--accent-ink);font-weight:600">${ic("arrowL",15)}回企業平台首頁</a></div></div>`;return}
  const h=state.route;let body,active,title;
  if(h.startsWith("#/d/")){body=viewDetail(h.slice(4));active="docs";title="簽呈詳情"}
  else if(h.startsWith("#/new")){body=viewNew();active="new";title=state.editingId?"修改簽呈":"發起簽呈"}
  else {body=viewDocs();active="docs";title="簽呈列表"}
  app.innerHTML=shell(body,active,title)}

window.addEventListener("hashchange",()=>{state.route=location.hash||"#/docs";state.sidebarOpen=false;state.notifOpen=false;if(!state.route.startsWith("#/new"))state.editingId=null;render()});
document.addEventListener("click",()=>{if(state.notifOpen){state.notifOpen=false;render()}});
/* 讀首頁登入 session：自動帶身分、跳過簽呈登入畫面。switchRole 仍可在側欄測試切換 */
function ehubSession(){try{return JSON.parse(localStorage.getItem("ehub_session")||"null")}catch(e){return null}}
(function(){const s=ehubSession();if(s)state.user=Object.values(USERS).find(x=>x.name===s.name)||USERS[s.role==="admin"?"admin":"u1"];})();
state.route=location.hash||"#/docs";render();
</script>
</body>
</html>
