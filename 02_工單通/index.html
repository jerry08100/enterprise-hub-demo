<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工單通 TicketHub — 前端 Demo（MVP 完整流程）</title>
<style>
  :root{
    /* 主色：白；輔助色：深藍 navy */
    --bg:#EEF2F9; --surface:#FFFFFF; --surface-2:#F1F5FB;
    --ink:#16223A; --ink-2:#5A6786; --ink-3:#8A95AD;
    --line:#E1E7F1; --line-2:#EDF1F8;
    --accent:#1E3A8A; --accent-ink:#1E3A8A; --accent-soft:#E5EAF6;
    /* 功能性狀態色（資料編碼用） */
    --s-open:#2563A8;     --s-open-bg:#E5EFF8;
    --s-progress:#B7791F; --s-progress-bg:#FBF1DD;
    --s-appr:#5B4B8A;     --s-appr-bg:#ECE9F6;
    --s-need:#C2603B;     --s-need-bg:#FAE8DF;
    --s-transfer:#2A7B8C; --s-transfer-bg:#E1F0F2;
    --s-resolved:#2F8F5B; --s-resolved-bg:#E4F1E9;
    --s-closed:#5C6B82;   --s-closed-bg:#EBEEF3;
    --danger:#C0392B;     --danger-bg:#F8E7E4;
    --r:12px; --r-sm:8px; --r-lg:16px;
    --sh-1:0 1px 2px rgba(22,34,58,.05);
    --sh-2:0 12px 30px rgba(22,34,58,.10), 0 2px 6px rgba(22,34,58,.05);
    --glow:0 4px 16px rgba(30,58,138,.22);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(1100px 600px at 84% -12%, rgba(30,58,138,.07), transparent 60%),
      radial-gradient(820px 480px at 2% 108%, rgba(30,58,138,.04), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    color:var(--ink); font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  input::placeholder,textarea::placeholder{color:var(--ink-3)}
  .mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:11px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  svg{display:block}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

  #app{min-height:100%}
  .layout{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

  /* sidebar */
  .sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px;border-bottom:1px solid var(--line-2)}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;flex:none;box-shadow:var(--glow)}
  .brand b{font-size:16px;letter-spacing:.01em}
  .brand .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.18em;font-family:var(--mono)}
  .nav{padding:14px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav .lbl{font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;font-size:10px;color:var(--ink-3);padding:12px 12px 6px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);color:var(--ink-2);font-weight:500;transition:.15s}
  .nav a:hover{background:var(--surface-2);color:var(--ink)}
  .nav a.active{background:var(--accent-soft);color:var(--accent-ink)}
  .nav a .ic{color:currentColor;flex:none}
  .nav a .count{margin-left:auto;font-size:12px;background:var(--surface-2);color:var(--ink-2);padding:1px 8px;border-radius:999px;font-weight:600}
  .nav a.active .count{background:var(--surface);color:var(--accent-ink)}
  .nav a .count.hot{background:var(--danger);color:#fff}

  .userbox{border-top:1px solid var(--line-2);padding:14px 12px}
  .role-pick{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--ink-3);padding:4px 8px 8px;text-transform:uppercase}
  .ucard{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);background:var(--surface-2)}
  .ucard .av{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;flex:none;font-size:14px}
  .ucard .nm{font-weight:600;font-size:13px;line-height:1.2}
  .ucard select{margin-top:2px;font-family:inherit;font-size:11.5px;color:var(--ink);border:1px solid var(--line);background:var(--surface-2);border-radius:6px;padding:2px 4px;width:100%}
  .ucard .rl{font-size:11px;color:var(--ink-2)}
  .ucard .logout{margin-left:auto;color:var(--ink-3);padding:4px}
  .ucard .logout:hover{color:var(--danger)}
  .demo-sw{width:100%;font-family:inherit;font-size:12px;color:var(--ink);border:1px solid var(--line);background:var(--surface-2);border-radius:6px;padding:6px 8px;margin-top:6px;cursor:pointer}

  /* topbar */
  .main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;flex:none;z-index:20;position:relative}
  .topbar h1{font-size:17px;font-weight:700}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:none;border:none;border-bottom:1.5px solid var(--line);border-radius:0;padding:6px 2px;width:260px;color:var(--ink-3);transition:border-color .15s}
  .search:focus-within{border-bottom-color:var(--accent)}
  .search input{border:none;background:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink);width:100%}
  .iconbtn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--ink-2);position:relative}
  .iconbtn:hover{background:var(--surface-2);color:var(--ink)}
  .iconbtn .badge-n{position:absolute;top:4px;right:4px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--surface)}

  /* content */
  .content{padding:26px 28px 48px;max-width:1240px;width:100%;margin:0 auto;flex:1;overflow-y:auto}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}
  .pagehead .k{font-family:var(--mono);color:var(--accent);font-size:11px;letter-spacing:.18em;margin-bottom:6px}
  .pagehead h2{font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .pagehead p{color:var(--ink-2);margin-top:5px;font-size:13.5px}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-sm);font-weight:600;font-size:13.5px;transition:.15s;border:1px solid transparent}
  .btn-primary{background:var(--accent);color:var(--on-accent,#fff);box-shadow:var(--glow)}
  .btn-primary:hover{background:var(--accent-ink);box-shadow:var(--sh-2)}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
  .btn-ghost:hover{border-color:var(--ink-3)}
  .btn-danger,.btn.danger{background:rgba(192,57,43,.14);color:#d9534f;border:1px solid rgba(192,57,43,.34)}
  .btn-danger:hover,.btn.danger:hover{background:rgba(192,57,43,.24)}
  .btn-sm{padding:6px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;box-shadow:var(--sh-1)}
  .kpi .tile{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;margin-bottom:14px}
  .kpi .v{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .kpi .l{color:var(--ink-2);font-size:12.5px;margin-top:5px}
  .kpi .d{font-size:11.5px;margin-top:7px;display:flex;align-items:center;gap:4px}
  .kpi .kgo{font-size:11.5px;font-weight:600;color:var(--accent-ink);margin-top:8px}
  .kpi.kpi-click{cursor:pointer;transition:.15s} .kpi.kpi-click:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:var(--accent-soft)}
  .quickbar{display:flex;align-items:center;gap:9px;background:var(--accent-soft);color:var(--accent-ink);border-radius:var(--r-sm);padding:9px 13px;margin-bottom:16px;font-size:13px} .quickbar span{flex:1} .quickbar b{font-weight:800}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1)}
  .card-h{padding:16px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .card-h h3{font-size:14.5px;font-weight:700}
  .card-h .mono{color:var(--ink-3);margin-left:auto}
  .recent-row{transition:.12s} .recent-row:hover{background:var(--surface-2)}
  .grid-2{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}

  .bars{padding:18px 20px 22px;display:flex;flex-direction:column;gap:12px}
  .bar-row{display:grid;grid-template-columns:96px 1fr 34px;align-items:center;gap:12px}
  .bar-row .nm{font-size:12.5px;color:var(--ink-2)}
  .bar-track{height:9px;background:var(--surface-2);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px}
  .bar-row .vn{font-size:13px;font-weight:700;text-align:right}

  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--ink-2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--accent-ink);border-bottom-color:var(--accent)}
  .tab .count{font-size:11.5px;background:var(--surface-2);padding:0 7px;border-radius:999px;color:var(--ink-2)}
  .tab.active .count{background:var(--accent-soft);color:var(--accent-ink)}

  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .selwrap{position:relative}
  select.filter{appearance:none;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 30px 8px 13px;cursor:pointer}
  select.filter:hover{border-color:var(--ink-3)}
  .selwrap::after{content:"";position:absolute;right:12px;top:50%;width:7px;height:7px;border-right:2px solid var(--ink-3);border-bottom:2px solid var(--ink-3);transform:translateY(-70%) rotate(45deg);pointer-events:none}

  .ttable{width:100%;border-collapse:collapse}
  .ttable thead th{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink-3);text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);font-weight:600;background:var(--surface-2)}
  .ttable tbody tr{border-bottom:1px solid var(--line-2);transition:.12s;cursor:pointer}
  .ttable tbody tr:last-child{border-bottom:none}
  .ttable tbody tr:hover{background:var(--surface-2)}
  .ttable td{padding:12px 16px;vertical-align:middle}
  .row-me td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
  .t-no{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.05em}
  .t-title{font-weight:600;color:var(--ink);font-size:13.5px}
  .t-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .who{display:flex;align-items:center;gap:8px}
  .who .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex:none}
  .who .nm{font-size:12.5px;font-weight:500} .who .dp{font-size:11px;color:var(--ink-3)}
  .av-unassigned{width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--line);display:grid;place-items:center;color:var(--ink-3)}

  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .pri{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600}
  .pri .bar{width:3px;height:13px;border-radius:2px}
  .sla{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
  .sla.ok{color:var(--ink-2)} .sla.warn{color:var(--s-progress)} .sla.over{color:var(--danger)} .sla.paused{color:var(--ink-3)} .sla.none{color:var(--ink-3)}
  .ball{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-2);white-space:nowrap}
  .ball.me{background:var(--accent-soft);color:var(--accent-ink)}
  .stall{font-size:11px;color:var(--s-need);font-weight:700;white-space:nowrap}

  .empty{padding:54px 20px;text-align:center;color:var(--ink-3)}
  .empty .ic{margin:0 auto 12px;opacity:.5}

  .detail-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;align-items:start}
  .d-head{padding:22px 24px;border-bottom:1px solid var(--line-2)}
  .d-head .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .d-head h2{font-size:21px;font-weight:800;line-height:1.25}
  .d-meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:16px}
  .d-meta .it .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-3);margin-bottom:4px}
  .d-body{padding:20px 24px}
  .d-body .sec-l{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-3);margin-bottom:9px;margin-top:18px}
  .d-body .sec-l:first-child{margin-top:0}
  .d-desc{color:var(--ink);line-height:1.7;font-size:14px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:15px 17px;white-space:pre-wrap}
  .refban{display:flex;align-items:center;gap:9px;background:var(--accent-soft);color:var(--accent-ink);border-radius:var(--r-sm);padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:4px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--s-transfer-bg);color:var(--s-transfer)}

  .timeline{padding:6px 24px 22px;position:relative}
  .tl-item{display:grid;grid-template-columns:34px 1fr;gap:13px;padding-bottom:18px;position:relative}
  .tl-item:not(:last-child)::before{content:"";position:absolute;left:16px;top:32px;bottom:0;width:2px;background:var(--line-2)}
  .tl-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:none;z-index:1;background:var(--surface-2);border:1px solid var(--line)}
  .tl-body .h{font-size:13px}.tl-body .h b{font-weight:700}
  .tl-body .tm{font-size:11px;color:var(--ink-3);margin-top:2px;font-variant-numeric:tabular-nums}
  .tl-comment{margin-top:7px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;border-top-left-radius:2px;padding:9px 13px;font-size:13px;color:var(--ink);line-height:1.6;white-space:pre-wrap}
  .tl-comment.reason{border-left:3px solid var(--s-need)}
  .tl-comment.opinion{border-left:3px solid var(--s-appr)}
  .tl-atts{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}

  .commentbox{padding:14px 24px;border-top:1px solid var(--line-2)}
  .commentbox .row{display:flex;gap:10px}
  .commentbox textarea{flex:1;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-family:inherit;font-size:13.5px;resize:vertical;min-height:42px;outline:none;background:var(--surface-2);color:var(--ink)}
  .commentbox textarea:focus{border-color:var(--accent)}
  .cmt-tools{display:flex;align-items:center;gap:10px;margin-top:9px}
  .cmt-att{font-size:12px;color:var(--ink-3)}

  .side .card-h{padding:14px 18px}
  .side-sec{padding:16px 18px;border-bottom:1px solid var(--line-2)}
  .side-sec:last-child{border-bottom:none}
  .side-sec .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-3);margin-bottom:10px}
  .actcol{display:flex;flex-direction:column;gap:8px}
  .actcol .btn{justify-content:flex-start;width:100%}
  .sla-big{text-align:center;padding:4px 0}
  .sla-big .t{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .sla-big .l{font-size:11.5px;color:var(--ink-2);margin-top:3px}

  .form-card{max-width:680px}
  .field{padding:0 24px 18px}
  .field:first-of-type{padding-top:22px}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:7px}
  .field label .req{color:var(--danger);margin-left:3px}
  .field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px;outline:none;background:var(--surface-2)}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:96px;line-height:1.6;white-space:pre-wrap}
  .field .hint{font-size:11.5px;color:var(--ink-3);margin-top:5px}
  .readonly-field{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px 13px}
  .readonly-field .ro-tag{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--ink-3);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .field-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .field-2 .field{padding-left:0;padding-right:0}
  .pri-pick{display:flex;gap:8px;flex-wrap:wrap}
  .pri-opt{flex:1;min-width:80px;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px;text-align:center;font-weight:600;font-size:13px;transition:.12s;background:var(--surface-2)}
  .pri-opt:hover{border-color:var(--ink-3)}
  .pri-opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .dept-pick{display:flex;flex-wrap:wrap;gap:8px}
  .dept-opt{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);transition:.12s}
  .dept-opt:hover{border-color:var(--ink-3)}
  .dept-opt.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .dept-opt input{accent-color:var(--accent);width:15px;height:15px}
  .form-foot{padding:18px 24px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end}
  .route-note{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 12px;margin-top:7px}
  .route-note b{color:var(--accent-ink)}
  .tpls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tpl{border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;cursor:pointer;transition:.12s;background:var(--surface-2)}
  .tpl:hover{border-color:var(--accent);background:var(--accent-soft)}
  .tpl .nm{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
  .tpl .mt{font-size:11px;color:var(--ink-3);margin-top:3px}

  .dropzone{border:1.5px dashed var(--line);border-radius:var(--r-sm);padding:18px;text-align:center;cursor:pointer;transition:.15s;color:var(--ink-2);background:var(--surface-2)}
  .dropzone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
  .dropzone .ic{margin:0 auto 8px} .dropzone .t{font-weight:600;font-size:13px} .dropzone .s{font-size:11.5px;color:var(--ink-3);margin-top:3px}
  .filelist{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .fileitem{display:flex;align-items:center;gap:11px;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2)}
  .fileitem .thumb{width:38px;height:38px;border-radius:7px;overflow:hidden;flex:none;display:grid;place-items:center;background:var(--surface);color:var(--ink-2)}
  .fileitem .thumb img{width:100%;height:100%;object-fit:cover}
  .fileitem .meta{flex:1;min-width:0} .fileitem .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .fileitem .sz{font-size:11px;color:var(--ink-3)}
  .fileitem .rm{color:var(--ink-3);padding:4px}.fileitem .rm:hover{color:var(--danger)}
  .att-grid{display:flex;flex-wrap:wrap;gap:12px}
  .att{display:flex;align-items:center;gap:10px;padding:9px 13px 9px 9px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);min-width:200px}
  .att .thumb{width:42px;height:42px;border-radius:7px;flex:none;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent-ink);overflow:hidden}
  .att .thumb img{width:100%;height:100%;object-fit:cover}
  .att .nm{font-size:13px;font-weight:600;line-height:1.25} .att .sz{font-size:11px;color:var(--ink-3)}
  .att .dl{margin-left:auto;color:var(--ink-2);padding:5px}.att .dl:hover{color:var(--accent)}
  .att.mini{min-width:0;padding:5px 10px 5px 7px;gap:7px} .att.mini .thumb{width:26px;height:26px}

  .alertbar{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;margin-bottom:14px}
  .alertbar .ic{margin-top:1px;flex:none}
  .alertbar.warn{background:var(--s-need-bg);color:var(--s-need)}
  .alertbar.over{background:var(--danger-bg);color:var(--danger)}
  .al-body{flex:1;min-width:0}
  .al-h{margin-bottom:6px}
  .al-item{display:inline-flex;align-items:baseline;gap:7px;font-weight:700;text-decoration:underline;text-underline-offset:2px;margin:0 16px 4px 0;cursor:pointer}
  .al-item span{font-weight:500;font-size:11.5px;opacity:.82;text-decoration:none;font-variant-numeric:tabular-nums}
  .al-item:hover{opacity:.7}

  .notif-panel{position:absolute;top:54px;right:18px;width:344px;max-height:64vh;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);z-index:60}
  .notif-h{padding:13px 16px;border-bottom:1px solid var(--line-2);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .notif-h .clr{margin-left:auto;font-size:12px;color:var(--accent-ink);font-weight:600;cursor:pointer}
  .notif{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:.12s}
  .notif:last-child{border-bottom:none} .notif:hover{background:var(--surface-2)} .notif.unread{background:var(--accent-soft)}
  .notif .dotn{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex:none}
  .notif .tx{font-size:12.5px;line-height:1.45} .notif .tm{font-size:11px;color:var(--ink-3);margin-top:3px}

  /* 進度條 stepper */
  .d-step{padding:16px 24px 14px;border-bottom:1px solid var(--line-2)}
  .stepper{display:flex;align-items:flex-start;margin-bottom:12px}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;width:74px}
  .step .sc{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:12.5px;font-weight:700;background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}
  .step.done .sc{background:var(--s-resolved);color:#fff;border-color:transparent}
  .step.cur .sc{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 0 0 4px var(--accent-soft)}
  .step .sl{font-size:11.5px;color:var(--ink-3);font-weight:600;text-align:center;line-height:1.3}
  .step.cur .sl{color:var(--accent-ink)} .step.done .sl{color:var(--ink-2)}
  .sline{flex:1;height:2px;background:var(--line);margin:14px 2px 0}
  .sline.done{background:var(--s-resolved)}
  .step-now{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 13px}
  .step-now b{color:var(--ink)}
  .step-act{width:100%;justify-content:center;margin-top:10px;padding:11px}
  /* 受案進度 多部門軌 */
  .tracks{display:flex;flex-direction:column;gap:10px}
  .track-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;background:var(--surface-2)}
  .track-card.mine{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
  .track-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .track-dept{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:6px}
  .track-who{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2)}
  .track-who .av{width:22px;height:22px;font-size:10px;border-radius:50%;display:grid;place-items:center;font-weight:700;flex:none}
  .track-sla{margin-left:auto;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums}
  .track-sla.over{color:var(--danger)} .track-sla.warn{color:var(--s-progress)} .track-sla.ok{color:var(--ink-2)} .track-sla.paused,.track-sla.none{color:var(--ink-3)}
  .track-acts{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}

  .modal-ov{position:fixed;inset:0;background:rgba(22,34,58,.5);z-index:200;display:grid;place-items:center;padding:20px;animation:mfade .15s ease}
  .modal-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2);padding:22px 22px 18px;animation:mpop .18s ease}
  .modal-title{font-size:16px;font-weight:800;margin-bottom:6px}
  .modal-msg{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-bottom:14px}
  .modal-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:8px 0 7px}
  .modal-input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;outline:none;margin-bottom:4px}
  .modal-input:focus{border-color:var(--accent)}
  textarea.modal-input{resize:vertical;min-height:74px;line-height:1.6}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  .modal-info{max-height:52vh;overflow-y:auto;margin-top:4px}
  .diff-block{margin-bottom:16px} .diff-block:last-child{margin-bottom:0}
  .diff-l{font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:7px}
  .diff-row{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start}
  .diff-tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;flex:none;margin-top:2px}
  .diff-tag.old{background:var(--danger-bg);color:var(--danger)}
  .diff-tag.new{background:var(--s-resolved-bg);color:var(--s-resolved)}
  .diff-txt{font-size:13px;line-height:1.65;white-space:pre-wrap;flex:1;background:var(--surface-2);border:1px solid var(--line-2);border-radius:6px;padding:8px 11px}
  .linklike{color:var(--accent-ink);font-weight:600;font-size:12.5px;display:inline-flex;align-items:center;gap:4px;text-decoration:underline;text-underline-offset:2px}
  .linklike:hover{color:var(--accent)}
  @keyframes mfade{from{opacity:0}to{opacity:1}}
  @keyframes mpop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#16223A;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:210;display:flex;align-items:center;gap:9px;pointer-events:none}

  .demo-flag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--s-progress);background:var(--s-progress-bg);padding:2px 9px;border-radius:999px;font-weight:600}

  .login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(1200px 600px at 70% -10%,var(--accent-soft),transparent),var(--bg)}
  .login-card{width:100%;max-width:410px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2);padding:34px 32px;text-align:center}
  .login-card .logo{width:54px;height:54px;border-radius:14px;background:var(--accent);color:#fff;display:grid;place-items:center;margin:0 auto 18px;box-shadow:var(--glow)}

  .login-field{text-align:left;margin-bottom:14px}
  .login-field label{font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:6px}
  .login-field input,.login-field select{width:100%;font-family:inherit;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);outline:none;background:var(--surface-2);color:var(--ink)}

  .login-note{margin-top:18px;font-size:11.5px;color:var(--ink-3);line-height:1.6}

  @media(max-width:920px){

    .search{width:auto;flex:1;max-width:180px}
  }
  .menu-toggle{display:none;width:38px;height:38px;border-radius:10px;place-items:center;color:var(--ink-2)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(22,34,58,.42);z-index:40}
  .scrim.show{display:block}

/* ====================== Time helpers ====================== */
const H=3600e3, DAY=86400e3;

function fmt(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,"0");return `${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}
function rel(ts){const m=Math.round((now()-ts)/6e4);if(m<1)return "剛剛";if(m<60)return m+" 分鐘前";const h=Math.floor(m/60);if(h<24)return h+" 小時前";return Math.floor(h/24)+" 天前"}
function slaTxt(ms,over){const a=Math.abs(ms),h=Math.floor(a/H),m=Math.floor((a%H)/6e4);const t=h>=24?Math.floor(h/24)+" 天 "+(h%24)+" 時":h+" 時 "+m+" 分";return (over?"逾期 ":"剩 ")+t}
/* ---- SLA（每受案部門一軌，各自算；暫停為顯示凍結，demo 簡化不回補秒數）---- */
function trackPaused(t,k){return k.st==="need_info"||(t.sharedAppr&&t.sharedAppr.st==="pending")||(k.appr&&k.appr.st==="pending")}
function slaOf(t,k){
  if(k.st==="done")return {kind:"none",txt:"已完成"};
  if(t.status==="closed")return {kind:"none",txt:"—"};
  if(trackPaused(t,k))return {kind:"paused",txt:"計時暫停"};
  const ms=k.sla-now(),over=ms<0;
  return {kind:over?"over":(ms<6*H?"warn":"ok"),over,txt:slaTxt(ms,over)};
}
function ticketSla(t){
  if(t.status==="closed")return {kind:"none",txt:"—"};
  const act=t.tracks.filter(k=>k.st!=="done");
  if(!act.length)return {kind:"none",txt:"—"};
  const order={over:0,warn:1,ok:2,paused:3,none:4};
  return act.map(k=>slaOf(t,k)).sort((a,b)=>order[a.kind]-order[b.kind])[0];
}
function slaInfo(t){return ticketSla(t)}
function stalledDays(t){if(t.status==="closed")return 0;return Math.floor((now()-t.updated)/DAY)}

/* ---- rollup：由各軌彙整整體狀態 ---- */
function rollup(t){
  if(t.resolution){t.status="closed";return}
  if(t.sharedAppr&&t.sharedAppr.st==="pending"){t.status="pending_approval";return}
  const sts=t.tracks.map(k=>k.st);
  if(sts.length&&sts.every(s=>s==="done")){t.status="resolved";return}
  if(sts.some(s=>s==="need_info")){t.status="need_info";return}
  if(sts.length&&sts.every(s=>s==="assigned")){t.status="open";return}
  t.status="in_progress";
}

/* ---- ball：球在誰手上（多軌）---- */
function trackBallOnMe(t,k,u){u=u||state.user;if(!u)return false;
  if(k.st==="done"||k.st==="need_info")return false;
  if(t.sharedAppr&&t.sharedAppr.st==="pending")return false;
  if(k.appr&&k.appr.st==="pending")return (u.role==="manager"&&u.dept===k.dept)||u.role==="admin";
  if(k.asgId)return k.asgId===u.id||u.role==="admin";
  return (u.role==="handler"||u.role==="manager")&&u.dept===k.dept;
}
function ballOnMe(t,u){u=u||state.user;if(!u||t.status==="closed")return false;
  if(t.reqId===u.id&&(t.status==="resolved"||t.status==="need_info"))return true;
  if(t.sharedAppr&&t.sharedAppr.st==="pending"&&((u.role==="manager"&&t.reqDept===u.dept)||u.role==="admin"))return true;
  return t.tracks.some(k=>trackBallOnMe(t,k,u));
}
function ballText(t){
  if(t.status==="closed")return "";
  if(t.status==="pending_approval")return t.reqDept+"主管簽核";
  if(t.status==="resolved")return USERS[t.reqId].name+" 確認";
  if(t.status==="need_info")return USERS[t.reqId].name+" 補件";
  const act=t.tracks.filter(k=>k.st!=="done");
  return act.map(k=>{
    if(k.appr&&k.appr.st==="pending")return k.dept+"·待主管簽核";
    return k.dept+(k.asgId?("·"+USERS[k.asgId].name):"·待認領");
  }).join("、")||"—";
}

function migrate(t){

      :t.status==="need_info"?"need_info":(t.asgId?"working":"assigned");
    t.tracks=[{dept:t.asgDept,asgId:t.asgId||null,st,sla:t.sla,appr:{st:"none"}}];
    t.sharedAppr={st:t.status==="pending_approval"?"pending":"none",by:null,opinion:""};
  }
  if(!t.sharedAppr)t.sharedAppr={st:"none",by:null,opinion:""};
  rollup(t);
}

/* in-page modal — 取代 native prompt/confirm */
function openModal({title,message,field,okText="確定",cancelText="取消",danger}){
  return new Promise(resolve=>{
    const host=document.getElementById("modal");
    let fh="";
    if(field){
      if(field.type==="textarea")fh=`<textarea class="modal-input" id="modal-in" rows="3" placeholder="${field.placeholder||""}"></textarea>`;
      else if(field.type==="select")fh=`<select class="modal-input" id="modal-in">${field.options.map(o=>`<option value="${o.value}">${o.label}</option>`).join("")}</select>`;
      else fh=`<input class="modal-input" id="modal-in" placeholder="${field.placeholder||""}">`;
    }
    const withFiles=field&&field.files;
    const filesHTML=withFiles?`<div class="filelist" id="modal-files" style="margin-top:10px"></div>
      <button type="button" class="btn btn-ghost btn-sm" id="modal-attach" style="margin-top:8px">${ic("attach",14)}附加檔案</button>
      <input type="file" id="modal-file" multiple style="display:none">`:"";
    host.innerHTML=`<div class="modal-ov" id="modal-ov"><div class="modal-card">
      <div class="modal-title">${title}</div>
      ${message?`<div class="modal-msg">${message}</div>`:""}
      ${field&&field.label?`<label class="modal-label">${field.label}</label>`:""}${fh}${filesHTML}
      <div class="modal-foot"><button class="btn btn-ghost" id="modal-cc">${cancelText}</button>
        <button class="btn btn-${danger?"danger":"primary"}" id="modal-ok">${okText}</button></div>
    </div></div>`;
    const inp=document.getElementById("modal-in");
    const mfiles=[];
    const close=v=>{document.onkeydown=null;host.innerHTML="";resolve(v)};
    if(inp)setTimeout(()=>inp.focus(),20);
    if(withFiles){
      const fl=document.getElementById("modal-files");
      const renderFl=()=>fl.innerHTML=mfiles.map((f,i)=>`<div class="fileitem"><div class="thumb">${(f.data||f.url)&&f.isImg?`<img src="${esc(f.data||f.url)}">`:ic(f.isImg?"image":"file",18)}</div><div class="meta"><div class="nm">${esc(f.name)}</div><div class="sz">${f.size}</div></div><button class="rm" onclick="this.parentNode.remove();window.__mfrm&&window.__mfrm(${i})">${ic("xCircle",18)}</button></div>`).join("");
      window.__mfrm=i=>{mfiles.splice(i,1);renderFl()};
      document.getElementById("modal-attach").onclick=()=>document.getElementById("modal-file").click();
      document.getElementById("modal-file").onchange=e=>{EHub.readFiles(e.target.files,function(arr){arr.forEach(f=>mfiles.push(f));renderFl()});e.target.value=""};
    }
    document.getElementById("modal-ok").onclick=()=>{
      if(!field)return close(true);
      const v=field.type==="select"?inp.value:(inp.value||"").trim();
      if(field.required&&!v&&!mfiles.length){inp.style.borderColor="var(--danger)";inp.focus();return}
      close(withFiles?{text:v,files:mfiles}:v);
    };
    document.getElementById("modal-cc").onclick=()=>close(field?null:false);
    document.getElementById("modal-ov").onclick=e=>{if(e.target.id==="modal-ov")close(field?null:false)};
    if(inp&&field.type==="text")inp.onkeydown=e=>{if(e.key==="Enter")document.getElementById("modal-ok").click()};
    document.onkeydown=e=>{if(e.key==="Escape")close(field?null:false)};
  });
}

  if(r===null)return;if(r.text||r.files.length)ev(t,"comment",{text:(r.text||"（補充附件）")+`　〔致 ${k.dept}〕`,atts:r.files});if(r.files.length)t.attachments=(t.attachments||[]).concat(r.files);
  k.st="working";ev(t,"resubmitted",{dept:k.dept});touch(t);notify(k.asgId,`提單人已補件再送（${k.dept}）：${t.title}`,id);toast("已補充並送回 "+k.dept);render()}
function confirmClose(id){const t=T(id);t.resolution="completed";touch(t);ev(t,"closed",{reso:"completed"});t.tracks.forEach(k=>notify(k.asgId,`提單人已確認結案：${t.title}`,id));toast("已確認，工單結案");render()}
async function rejectComplete(id){const t=T(id);const r=await mArea("退回受案","退回原因（必填，哪裡還沒完成）",true);if(!r)return;t.tracks.forEach(k=>{if(k.st==="done")k.st="working"});ev(t,"reopened",{reason:r});touch(t);t.tracks.forEach(k=>notify(k.asgId,`提單人認為未完成，退回：${t.title}`,id));toast("已退回受案（全部部門）");render()}
async function requesterClose(id){const t=T(id);const ok=await mConfirm("確定自行結案？","結案後此工單即關閉、無法復原，並會通知各受案部門。確定要結案嗎？",true);if(!ok)return;
  const r=await mArea("結案原因","結案原因（選填，例：需求消失、改用其他方式）",false);if(r===null)return;t.resolution="requester_closed";touch(t);ev(t,"closed",{reso:"requester_closed",reason:r});t.tracks.forEach(k=>notify(k.asgId||mgrOf(k.dept),`提單人已自行結案（${t.no}）：${t.title}`,id));toast("已結案，已通知受案單位");render()}
async function withdraw(id){const t=T(id);const ok=await mConfirm("撤回工單","確定撤回此工單？撤回後即結案，無法復原。",true);if(!ok)return;t.resolution="withdrawn";touch(t);ev(t,"withdrawn",{});toast("已撤回");render()}
async function changePrio(id){const t=T(id);const p=await mSelect("調整優先級","新優先級",Object.entries(PRIOS).map(([k,v])=>({value:k,label:v.l+"（"+v.h+" 小時內）"})));if(!p)return;const from=t.prio;t.prio=p;t.tracks.forEach(k=>{if(k.st!=="done")k.sla=due(p,t.created)});t.updated=now();ev(t,"priority_changed",{from,to:p});toast("優先級改為 "+PRIOS[p].l);render()}
async function addCollab(id){const t=T(id);const d=await mSelect("加會辦","加會辦哪個部門（協助參與，非各自負責）？",deptOpts());if(!d)return;if(!t.collab)t.collab=[];if(t.collab.includes(d)){toast("該部門已在會辦","warn");return}t.collab.push(d);ev(t,"collab_added",{dept:d});notify(mgrOf(d),`邀請會辦：${t.title}`,id);toast("已加會辦 "+d);render()}
function addComment(id){const t=T(id);const ta=document.getElementById("cmt");const v=ta?ta.value.trim():"";if(!v&&!cmtFiles.length)return;ev(t,"comment",{text:v,atts:cmtFiles.slice()});cmtFiles=[];toast("已留言","send");render()}
function editTicket(id){const t=T(id);state.editingId=id;draft={prio:t.prio,cat:t.cat,files:(t.attachments||[]).slice(),refNo:t.refNo||null,_title:t.title,_desc:t.desc,_dept:t.reqDept};state.route="#/new";location.hash="#/new";render()}

/* 工單層操作（提單人 + 提單人主管共用簽核） */
function ticketActions(t){
  const u=state.user,A=[],admin=u.role==="admin";const a=(l,i,f,s)=>A.push({label:l,icon:i,fn:f,style:s});
  if(t.status==="closed")return A;const isReq=t.reqId===u.id;
  if(t.sharedAppr.st==="pending"&&((u.role==="manager"&&t.reqDept===u.dept)||admin)){a("核准簽核（全單）","shield",()=>approveShared(t.id),"primary");a("駁回 · 退回受案","back",()=>rejectShared(t.id),"danger")}
  if(isReq){
    if(t.status==="open"){a("編輯工單","edit",()=>editTicket(t.id),"ghost");a("撤回工單","back",()=>withdraw(t.id),"danger")}
    if(t.status==="resolved"){a("確認完成 · 結案","checkLn",()=>confirmClose(t.id),"primary");a("未完成 · 退回受案","reply",()=>rejectComplete(t.id),"ghost")}
    if(t.status==="need_info"){a("編輯內容","edit",()=>editTicket(t.id),"ghost");a("自行結案","close",()=>requesterClose(t.id),"ghost")}
  }
  if((isReq||admin)&&t.status!=="resolved"){a("調整優先級","alarm",()=>changePrio(t.id),"ghost");a("加會辦部門","building",()=>addCollab(t.id),"ghost")}
  return A;
}
/* 受案部門軌操作（該部門處理人/主管） */
function trackActions(t,ki){
  const u=state.user,k=t.tracks[ki],A=[],admin=u.role==="admin";const a=(l,i,f,s)=>A.push({label:l,icon:i,fn:f,style:s});
  if(t.status==="closed")return A;
  if(t.sharedAppr.st==="pending")return A;
  if(k.appr.st==="pending"){if((u.role==="manager"&&u.dept===k.dept)||admin){a("核准本部門簽核","shield",()=>approveDept(t.id,ki),"primary");a("駁回","back",()=>rejectDept(t.id,ki),"danger")}return A}
  if(k.st==="need_info"){if(t.reqId===u.id)a("補充後再送","reply",()=>resubmitTrack(t.id,ki),"primary");return A}
  if(k.st==="done")return A;
  const mine=k.asgId?(k.asgId===u.id||admin):(((u.role==="handler"||u.role==="manager")&&u.dept===k.dept)||admin);
  if(!mine)return A;
  if(k.st==="assigned")a("認領 · 開始處理","receive",()=>claimTrack(t.id,ki),"primary");
  if(k.st==="working"){a("完成本部門","checkLn",()=>completeTrack(t.id,ki),"primary");a("請提單人主管簽核","shield",()=>requestSharedApproval(t.id,ki),"ghost");a("請本部門主管簽核","shield",()=>requestDeptApproval(t.id,ki),"ghost");a("退回提單人","reply",()=>returnTrack(t.id,ki),"ghost");a("轉單","forward",()=>transferTrack(t.id,ki),"ghost")}
  return A;
}
function myPrimary(t){const ta=ticketActions(t).find(a=>a.style==="primary");if(ta)return ta;
  for(let ki=0;ki<t.tracks.length;ki++){const p=trackActions(t,ki).find(a=>a.style==="primary");if(p)return p}return null;}

/* ====================== Visibility / tabs ====================== */
function inDept(t,dept){return t.tracks.some(k=>k.dept===dept)||(t.collab||[]).includes(dept)}
function needsMySign(t){const u=state.user;return (t.sharedAppr.st==="pending"&&(u.role==="admin"||(u.role==="manager"&&t.reqDept===u.dept)))||t.tracks.some(k=>k.appr.st==="pending"&&(u.role==="admin"||(u.role==="manager"&&k.dept===u.dept)))}
function visible(){const u=state.user;if(!u)return [];if(u.role==="admin")return TICKETS;
  return TICKETS.filter(t=>t.reqId===u.id||t.tracks.some(k=>k.asgId===u.id)
    ||((u.role==="handler")&&inDept(t,u.dept))
    ||((u.role==="manager")&&(t.reqDept===u.dept||inDept(t,u.dept))));
}
const ACTIVE=t=>t.status!=="closed";
function tabsFor(u){
  if(u.role==="requester")return [
    {l:"需要我處理",f:t=>t.reqId===u.id&&["need_info","resolved"].includes(t.status)},
    {l:"我的申請",f:t=>t.reqId===u.id}];
  if(u.role==="handler")return [
    {l:"待我處理",f:t=>ACTIVE(t)&&t.tracks.some(k=>trackBallOnMe(t,k))},
    {l:"部門佇列",f:t=>ACTIVE(t)&&t.tracks.some(k=>k.dept===u.dept&&!k.asgId&&k.st==="assigned")},
    {l:"部門全部",f:t=>inDept(t,u.dept)},
    {l:"我發起的",f:t=>t.reqId===u.id}];
  if(u.role==="manager")return [
    {l:"待我簽核",f:t=>needsMySign(t)},
    {l:"部門工單",f:t=>t.reqDept===u.dept||inDept(t,u.dept)},
    {l:"我發起的",f:t=>t.reqId===u.id}];
  return [{l:"全部工單",f:()=>true},{l:"進行中",f:ACTIVE},{l:"待簽核",f:t=>t.sharedAppr.st==="pending"||t.tracks.some(k=>k.appr.st==="pending")}];
}
function pendingApprovalCount(){return TICKETS.filter(t=>t.status!=="closed"&&needsMySign(t)).length}
function myTodoCount(){return visible().filter(t=>ballOnMe(t)).length}
/* 把當前登入者「待我處理」工單數即時寫進共用紅點層,首頁即時撈、隨操作更新 */
function syncTicketBadge(){try{var EH=window.EHub;if(!EH||!EH.loadBadges)return;var cnt={};Object.keys(USERS).forEach(function(uid){var u=USERS[uid];if(!u||u.role==="admin")return;cnt[uid]=TICKETS.filter(function(t){return ballOnMe(t,u)}).length});var m=EH.loadBadges();for(var nm in m){if(m[nm]&&m[nm].ticket!=null)delete m[nm].ticket}for(var u2 in cnt){var n2=USERS[u2]&&USERS[u2].name;if(!n2)continue;if(!m[n2])m[n2]={};m[n2].ticket=cnt[u2]}EH.saveBadges(m)}catch(e){}}
function unreadCount(){return NOTIFS.filter(n=>n.to===state.user.id&&!n.read).length}

/* ====================== Render helpers ====================== */
function avatar(uid){const u=USERS[uid];if(!u)return `<div class="av-unassigned">${ic("user",15)}</div>`;
  const hue=[...u.name].reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return `<div class="av" style="background:hsla(${hue},48%,52%,.2);color:hsl(${hue},60%,58%);border:1px solid hsla(${hue},48%,55%,.34)">${u.name[0]}</div>`}
function statusBadge(t){const m=STATUS[t.status];let lbl=m.l;if(t.status==="closed"&&t.resolution)lbl="已結案 · "+RESO[t.resolution].l;
  return `<span class="badge" style="color:${m.c};background:${m.bg}"><span class="dot"></span>${lbl}</span>`}
function prioPill(p){const m=PRIOS[p];return `<span class="pri" style="color:${m.c}"><span class="bar" style="background:${m.c}"></span>${m.l}</span>`}
function slaCell(t){const s=slaInfo(t);if(s.kind==="none")return `<span class="sla none">—</span>`;
  const i=s.kind==="paused"?"hourglass":(s.kind==="over"?"alarm":"time");
  return `<span class="sla ${s.kind}">${ic(i,14)}${s.txt}</span>`}
function ballTag(t){if(t.status==="closed")return "";const me=ballOnMe(t);
  return `<span class="ball ${me?"me":""}">${ic("hourglass",12)}${me?"待我":"待 "+ballText(t)}</span>`}
function trackBadge(t,k){
  let lbl,c;
  if(t.sharedAppr.st==="pending"){lbl="待主管簽核";c="s-appr"}
  else if(k.appr.st==="pending"){lbl="待"+k.dept+"主管簽核";c="s-appr"}
  else{const m={assigned:["待受理","s-open"],working:["處理中","s-progress"],need_info:["待提單人補件","s-need"],done:["已完成","s-resolved"]}[k.st];lbl=m[0];c=m[1]}
  return `<span class="badge" style="color:var(--${c});background:var(--${c}-bg)"><span class="dot"></span>${lbl}</span>`}
function stepper(t){
  const steps=["已提交","受理處理","完成確認","已結案"];
  const cur=t.status==="closed"?3:t.status==="resolved"?2:1;
  const sub={open:"待受理（受案部門待接手）",in_progress:"處理中",pending_approval:"待主管簽核",need_info:"待提單人補件",resolved:"待提單人確認",closed:(t.resolution?RESO[t.resolution].l:"完成")}[t.status]||"處理中";
  const who=t.status!=="closed"?ballText(t):null;
  return `<div class="stepper">${steps.map((s,i)=>
    `<div class="step ${i<cur?"done":i===cur?"cur":""}"><div class="sc">${i<cur?ic("checkLn",14):(i+1)}</div><div class="sl">${s}</div></div>${i<3?`<div class="sline ${i<cur?"done":""}"></div>`:""}`).join("")}</div>
    <div class="step-now">${ic("hourglass",14)}<span>目前環節：<b>${sub}</b>${who?` · 等 <b>${who}</b>`:""}</span></div>`;
}
function toast(msg,icon="check"){const el=document.getElementById("toast");el.innerHTML=ic(icon==="check"?"checkLn":icon,16)+`<span>${msg}</span>`;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2500)}
function attHTML(a,mini){const src=a.data||a.url;const dl=mini?"":(src?`<a class="dl" title="下載" href="${esc(src)}" download="${esc(a.name)}" onclick="event.stopPropagation()">${ic("download",18)}</a>`:`<button class="dl" title="下載" onclick="event.stopPropagation();toast('此為示意附件（無實際檔案）','download')">${ic("download",18)}</button>`);return `<div class="att ${mini?"mini":""}">
  <div class="thumb">${src&&a.isImg?`<img src="${esc(src)}" style="cursor:zoom-in" onclick="event.stopPropagation();EHub.lightbox(this.src)">`:ic(a.isImg?"image":"file",mini?15:20)}</div>
  <div><div class="nm">${esc(a.name)}</div>${a.size&&!mini?`<div class="sz">${a.size}</div>`:""}</div>
  ${dl}</div>`}

/* action registry — avoid fragile inline closures */
let _fnreg={},_fnid=0;
function reg(fn){const k="_f"+(_fnid++);_fnreg[k]=fn;return "window.__call('"+k+"')"}
window.__call=k=>{if(_fnreg[k])_fnreg[k]()};

function viewTickets(forceApproval){

  if(state.tab>=tabs.length)state.tab=0;
  const f=state.filters;
  const QF={todo:t=>ballOnMe(t),active:t=>t.status!=="closed",over:t=>slaInfo(t).kind==="over",closed:t=>t.status==="closed"};
  const base=state.quick?visible().filter(QF[state.quick.kind]):visible().filter(tabs[state.tab].f);
  let list=base.filter(t=>(!f.status||t.status===f.status)&&(!f.prio||t.prio===f.prio)&&(!f.cat||t.cat===f.cat)
    &&(!f.q||t.title.includes(f.q)||t.no.toLowerCase().includes(f.q.toLowerCase()))).sort((a,b)=>b.updated-a.updated);

  <div class="filters">
    <div class="selwrap"><select class="filter" onchange="setFilter('status',this.value)">${opt(STATUS,f.status,"全部狀態")}</select></div>

    <div class="selwrap"><select class="filter" onchange="setFilter('cat',this.value)">${opt(CATS,f.cat,"全部類別")}</select></div>
    ${f.status||f.prio||f.cat?`<button class="btn btn-ghost btn-sm" onclick="clearFilters()">${ic("close",15)}清除</button>`:""}
  </div>

function evHTML(e){const u=USERS[e.by]||{name:"系統"};const x=e.x||{};let txt="",extra="",cls="";const nm=`<b>${u.name}</b>`;
  switch(e.t){
    case "created":{let suf="";if(x.to)suf=`，指定 <b>${USERS[x.to].name}</b> 處理`;else if(x.multi||x.depts)suf=`，指派 <b>${(x.multi||x.depts).join("、")}</b>`;txt=`${nm} 建立工單${suf}`;break;}
    case "assigned":txt=`${nm} 認領並開始處理${x.dept?`（${x.dept}）`:""}`;break;
    case "approval_requested":txt=`${nm} ${x.auto?"（強制簽核類別）送出簽核":(x.shared?"送出提單人主管簽核":"送出主管簽核")}`;if(x.note)extra=esc(x.note);break;
    case "approved":txt=`${nm} 核准簽核（全單）`;if(x.opinion){extra=esc(x.opinion);cls="opinion"}break;
    case "approval_rejected":txt=`${nm} 駁回簽核 · 退回受案重辦`;extra=esc(x.reason);cls="reason";break;
    case "dept_approval_requested":txt=`${nm} 送出 <b>${x.dept}</b> 主管簽核`;if(x.note)extra=esc(x.note);break;
    case "dept_approved":txt=`${nm} 核准 <b>${x.dept}</b> 簽核`;if(x.opinion){extra=esc(x.opinion);cls="opinion"}break;
    case "dept_approval_rejected":txt=`${nm} 駁回 <b>${x.dept}</b> 簽核`;extra=esc(x.reason);cls="reason";break;
    case "returned":txt=`${nm} 退回提單人${x.dept?`（${x.dept}）`:""}`;extra=esc(x.reason);cls="reason";break;
    case "resubmitted":txt=`${nm} 補件後重新送出${x.dept?`（${x.dept}）`:""}`;break;
    case "track_done":txt=`${nm} 完成本部門${x.dept?`（${x.dept}）`:""}`;if(x.note)extra=esc(x.note);break;
    case "completed":txt=`${nm} 標記完成 · 待提單人確認`;if(x.note)extra=esc(x.note);break;
    case "reopened":txt=`${nm} 認為未完成 · 退回受案`;extra=esc(x.reason);cls="reason";break;
    case "closed":txt=`${nm} 結案（${x.reso?RESO[x.reso].l:"完成"}）`;if(x.reason)extra=esc(x.reason);break;
    case "withdrawn":txt=`${nm} 撤回工單`;break;
    case "transferred":txt=`${nm} 轉單${x.fromDept?` ${x.fromDept} →`:"至"} <b>${x.toDept}</b>`;if(x.reason)extra=esc(x.reason);cls="reason";break;
    case "collab_added":txt=`${nm} 加會辦 <b>${x.dept}</b>`;break;
    case "priority_changed":txt=`${nm} 優先級 ${PRIOS[x.from].l} → ${PRIOS[x.to].l}`;break;
    case "edited":{txt=`${nm} 編輯工單`;const parts=[];
      (x.fields||[]).forEach(f=>parts.push(`<b>${esc(f.label)}</b> ${esc(f.from)} → ${esc(f.to)}`));
      if((x.content||[]).length){const lk=reg(()=>showEditContent(x.content));parts.push(`<button class="linklike" onclick="${lk}">${ic("search",12)}查看提單內容修改</button>`);}
      extra=parts.length?parts.join("　·　"):"內容微調";break;}
    default:txt=`${nm} 留言`;if(x.text)extra=esc(x.text);
  }
  const body=extra?`<div class="tl-comment ${cls}">${extra}</div>`:"";
  const atts=(x.atts&&x.atts.length)?`<div class="tl-atts">${x.atts.map(a=>attHTML(a,true)).join("")}</div>`:"";
  return `<div class="tl-item"><div class="tl-dot">${ic(EVENT[e.t]||"send",16)}</div>
    <div class="tl-body"><div class="h">${txt}</div><div class="tm">${fmt(e.at)} · ${rel(e.at)}</div>${body}${atts}</div></div>`;
}

function routeNote(cat){const c=CATS[cat];return `${ic("forward",13)} 自動派 <b>${c.dept}</b>${c.approve?` · <b>此類別需主管簽核</b>`:""}`}

function ensureDepts(){if(!draft.depts||!draft.depts.length)draft.depts=[CATS[draft.cat].dept];draft.recips=draft.recips||{};draft.depts.forEach(d=>{if(!draft.recips[d])draft.recips[d]=defMgr(d)})}

  if(state.editingId){const t=T(state.editingId);
    const fieldCh=[],contentCh=[];
    if(t.title!==title)contentCh.push({label:"標題",from:t.title,to:title});
    if(t.desc!==desc)contentCh.push({label:"描述",from:t.desc,to:desc});
    if(t.cat!==draft.cat)fieldCh.push({label:"類別",from:CATS[t.cat].l,to:CATS[draft.cat].l});
    if(t.prio!==draft.prio)fieldCh.push({label:"優先級",from:PRIOS[t.prio].l,to:PRIOS[draft.prio].l});
    if(t.reqDept!==dept)fieldCh.push({label:"申請部門",from:t.reqDept,to:dept});
    const oN=(t.attachments||[]).length,nN=draft.files.length;if(nN!==oN)fieldCh.push({label:"附件",from:oN+" 個",to:nN+" 個"});
    t.title=title;t.desc=desc;t.cat=draft.cat;t.prio=draft.prio;t.reqDept=dept;t.attachments=draft.files.slice();t.updated=now();
    ev(t,"edited",{fields:fieldCh,content:contentCh});
    const summ=[...fieldCh,...contentCh].map(c=>c.label);
    t.tracks.forEach(k=>notify(k.asgId||mgrOf(k.dept),`提單人編輯了工單（${t.no}）：${summ.length?summ.join("、"):"內容"}`,t.id));
    const eid=state.editingId;state.editingId=null;draft={prio:"mid",cat:"IT",files:[],refNo:null,recipient:"",depts:[],recips:{}};toast("已儲存修改");go("#/t/"+eid);return}
  const c=CATS[draft.cat], approve=c.approve, id="n"+now();
  ensureDepts();
  if(!draft.depts.length){toast("請選至少一個受案部門","warn");return}
  const d=new Date();const p=n=>String(n).padStart(2,"0");
  const tracks=draft.depts.map(dep=>({dept:dep,asgId:draft.recips[dep]||defMgr(dep),st:"assigned",sla:due(draft.prio,now()),appr:{st:"none"}}));
  const t={id,no:`TK-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${String(60+TICKETS.length).padStart(3,"0")}`,
    title,desc,cat:draft.cat,prio:draft.prio,resolution:null,
    reqId:state.user.id,reqDept:dept,collab:[],refNo:draft.refNo,
    sharedAppr:{st:approve?"pending":"none",by:null,opinion:""},
    attachments:draft.files.slice(),created:now(),updated:now(),tracks,
    events:[{t:"created",by:state.user.id,at:now(),x:{depts:draft.depts.slice()}}]};
  if(approve)t.events.push({t:"approval_requested",by:state.user.id,at:now(),x:{auto:true,shared:true}});
  rollup(t);
  if(approve)notify(mgrOf(dept),`${USERS[state.user.id].name} 送出簽核：${title}`,id);
  else tracks.forEach(k=>notify(k.asgId,`指派給你的新工單（${t.no}）：${title}`,id));
  TICKETS.unshift(t);
  const summary=t.tracks.map(k=>k.dept).join("、");
  draft={prio:"mid",cat:"IT",files:[],refNo:null,recipient:"",depts:[],recips:{}};
  toast(approve?"已送出 · 待主管簽核":"工單已建立 · 受案 "+summary);
  go("#/t/"+id);
}

/* ====================== Notifications ====================== */
function viewNotif(){
  const list=NOTIFS.filter(n=>n.to===state.user.id).sort((a,b)=>b.at-a.at);
  const un=list.filter(n=>!n.read).length;
  return `<div class="notif-panel" onclick="event.stopPropagation()">
    <div class="notif-h">${ic("bell",16)}通知 ${un?`<span style="color:var(--danger)">(${un})</span>`:""}
      ${list.length?`<span class="clr" onclick="markAllRead()">全部已讀</span>`:""}</div>
    ${list.length?list.map(n=>`<div class="notif ${n.read?"":"unread"}" onclick="openNotif('${n.tid}')">
      ${n.read?"":'<div class="dotn"></div>'}<div style="flex:1"><div class="tx">${esc(n.text)}</div><div class="tm">${rel(n.at)}</div></div></div>`).join("")
    :`<div class="empty" style="padding:30px">${ic("bell",30)}<div>沒有通知</div></div>`}
  </div>`;
}

/* ====================== Router / shell ====================== */
function setTab(i){state.tab=i;state.quick=null;render()}
function setQuick(k,l){state.quick={kind:k,label:l};go("#/tickets")}
function clearQuick(){state.quick=null;render()}
function setDashRange(v){state.dashRange=v;render()}
function toggleTpl(){state.tplOpen=!state.tplOpen;render()}
function setFilter(k,v){state.filters[k]=v;render()}
function clearFilters(){state.filters={q:"",status:"",prio:"",cat:""};render()}
function go(h){location.hash=h}
function switchRole(id){state.user=USERS[id];state.tab=0;state.filters={q:"",status:"",prio:"",cat:""};state.notifOpen=false;if(state.route.startsWith("#/t/"))go("#/tickets");else render();toast("切換為 "+USERS[id].name+"（"+userRoleLabel(USERS[id])+"）","user")}
function login(){state.user=USERS[document.getElementById("login-role").value];go("#/dashboard")}
function logout(){try{localStorage.removeItem("ehub_session");localStorage.removeItem("ehub_role")}catch(e){}location.href="../index.html"}
function toggleSidebar(){state.sidebarOpen=!state.sidebarOpen;render()}
function toggleNotif(){state.notifOpen=!state.notifOpen;render()}
function markAllRead(){NOTIFS.forEach(n=>{if(n.to===state.user.id)n.read=true});render()}
function openNotif(tid){NOTIFS.forEach(n=>{if(n.to===state.user.id&&n.tid===tid)n.read=true});state.notifOpen=false;go("#/t/"+tid)}

function shell(content,active,title){
  const u=state.user;
  const cnt=(k,hot)=>k?`<span class="count ${hot?"hot":""}">${k}</span>`:"";
  const pa=pendingApprovalCount(), todo=myTodoCount(), unread=unreadCount();
  return `<div class="layout">
    <aside class="sidebar ${state.sidebarOpen?"open":""}">
      <div class="brand"><div class="logo">${ic("ticket",22)}</div><div><b>工單通</b><span class="en">TICKETHUB</span></div></div>
      <nav class="nav">
        <div class="lbl">主選單</div>
        <a href="#/dashboard" class="${active==="dash"?"active":""}">${ic("dashboard",19)}儀表板</a>
        <a href="#/tickets" class="${active==="tickets"?"active":""}">${ic("ticket",19)}工單列表${cnt(todo)}</a>
        <a href="#/new" class="${active==="new"?"active":""}">${ic("add",19)}新增工單</a>
        ${(u.role==="manager"||u.role==="admin")?`<a href="#/approvals" class="${active==="appr"?"active":""}">${ic("shield",19)}待我簽核${cnt(pa,pa>0)}</a>`:""}
        <div class="lbl" style="margin-top:8px">平台</div>
        <a href="../index.html" title="回企業平台首頁">${ic("arrowL",19)}回平台首頁</a>
      </nav>
      <div class="userbox">
        <div class="ucard"><div class="av">${u.name[0]}</div>
          <div style="flex:1;min-width:0"><div class="nm">${u.name}</div><div class="rl">${userRoleLabel(u)} · ${u.dept}</div></div>
          <button class="logout" onclick="logout()" title="登出">${ic("logout",18)}</button></div>
        <div class="role-pick" style="margin-top:10px">切換身分（測試用）</div>
        <select class="demo-sw" onchange="switchRole(this.value)">${DEMO_ROLES.map(id=>`<option value="${id}" ${u.id===id?"selected":""}>${userRoleLabel(USERS[id])} — ${USERS[id].name}（${USERS[id].dept}）</option>`).join("")}</select>
      </div>
    </aside>
    <div class="scrim ${state.sidebarOpen?"show":""}" onclick="toggleSidebar()"></div>
    <div class="main">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">${ic("menu",20)}</button>
        <h1>${title}</h1>
        <div class="search">${ic("search",16)}<input placeholder="搜尋標題 / 編號…" value="${esc(state.filters.q)}" oninput="state.filters.q=this.value" onkeydown="if(event.key==='Enter'){go('#/tickets');render()}"></div>
        <a href="../index.html" class="iconbtn" title="回企業平台首頁">${ic("home",19)}</a>
        <button class="iconbtn" title="通知" onclick="event.stopPropagation();toggleNotif()">${ic("bell",19)}${unread?`<span class="badge-n">${unread}</span>`:""}</button>
        ${state.notifOpen?viewNotif():""}
      </header>
      <main class="content">${content}</main>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  _fnreg={};_fnid=0;saveState();syncTicketBadge();
  if(!state.user){
    app.innerHTML=`<div class="login"><div class="login-card">
      <div class="logo">${ic("ticket",28)}</div><h1>工單通</h1><div class="en">TICKETHUB</div>
      <p class="sub">企業跨部門工單 / 申請追蹤系統</p>
      <div class="login-field"><label>帳號</label><input value="demo@company.com" readonly></div>
      <div class="login-field"><label>以哪個角色登入（測試）</label>
        <select id="login-role">${DEMO_ROLES.map(id=>`<option value="${id}">${userRoleLabel(USERS[id])} — ${USERS[id].name}（${USERS[id].dept}）</option>`).join("")}</select></div>
      <button class="btn btn-primary" onclick="login()">${ic("logout",17)}進入系統</button>
      <div class="login-note">測試階段 · 使用測試資料，尚未接資料庫。<br>切換角色可看申請人 / 處理人 / 主管 / 管理員不同流程。</div>
      <a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;margin-top:14px;font-size:12.5px;color:var(--accent-ink);font-weight:600">${ic("arrowL",15)}回企業平台首頁</a>
    </div></div>`;
    return;
  }
  const h=state.route;let body,active,title;
  if(h.startsWith("#/t/")){body=viewDetail(h.slice(4));active="tickets";title="工單詳情"}
  else if(h.startsWith("#/approvals")){body=viewTickets(true);active="appr";title="待我簽核"}
  else if(h.startsWith("#/tickets")){body=viewTickets(false);active="tickets";title="工單列表"}
  else if(h.startsWith("#/new")){body=viewNew();active="new";title=state.editingId?"編輯工單":"新增工單"}
  else {body=viewDashboard();active="dash";title="儀表板"}
  app.innerHTML=shell(body,active,title);
}

window.addEventListener("hashchange",()=>{state.route=location.hash||"#/dashboard";state.sidebarOpen=false;state.notifOpen=false;if(!state.route.startsWith("#/new"))state.editingId=null;if(!state.route.startsWith("#/tickets"))state.quick=null;render()});
document.addEventListener("click",()=>{if(state.notifOpen){state.notifOpen=false;render()}});
/* 讀首頁登入 session：自動帶身分、跳過工單通登入畫面（名字對應測試使用者，否則依角色）。switchRole 仍可在側欄測試切換 */
function ehubSession(){try{return JSON.parse(localStorage.getItem("ehub_session")||"null")}catch(e){return null}}
(function(){const s=ehubSession();if(s)state.user=Object.values(USERS).find(x=>x.name===s.name)||USERS[s.role==="admin"?"u4":"u1"];})();
state.route=location.hash||"#/dashboard";
render();
setInterval(()=>{if(!state.user||state.route.startsWith("#/new")||state.notifOpen)return;const ae=document.activeElement;if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))return;render()},30000);
</script>
</body>
