<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告後台 Announcement Admin — 企業平台</title>
<style>
  :root{
    /* 公告主色=琥珀金 amber */
    --bg:#F4F1EB; --surface:#FFFFFF; --surface-2:#F7F3EC;
    --ink:#332B1C; --ink-2:#6E6453; --ink-3:#A39880;
    --line:#E7DFCF; --line-2:#EFE8DB;
    --accent:#B7791F; --accent-ink:#946017; --accent-soft:#FBF1DD;
    --r:13px; --r-sm:9px; --r-lg:18px;
    --sh-1:0 1px 2px rgba(60,48,20,.05);
    --sh-2:0 16px 40px rgba(60,48,20,.13),0 2px 8px rgba(60,48,20,.06);
    --glow:0 8px 22px rgba(183,121,31,.26);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(rgba(60,48,20,.035) 1px,transparent 1px) 0 0/24px 24px,radial-gradient(1000px 560px at 88% -12%,rgba(183,121,31,.10),transparent 60%),var(--bg);
    background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  svg{display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
  .wrap{max-width:1060px;margin:0 auto;padding:34px 26px 70px}

  .topbar{display:flex;align-items:center;gap:13px;margin-bottom:8px}
  .topbar .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:var(--glow);flex:none}
  .topbar b{font-size:18px} .topbar .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.2em;font-family:var(--mono)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .home-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink-2);box-shadow:var(--sh-1);transition:.15s}
  .home-btn:hover{border-color:var(--accent);color:var(--accent-ink)}

  .note{display:flex;align-items:center;gap:9px;background:var(--accent-soft);border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin:16px 0 22px;font-size:12.5px;color:var(--accent-ink)}
  .note b{font-weight:700}

  .cols{display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
  .form{padding:20px;position:sticky;top:20px}
  .form h2{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .form .fh-sub{font-size:12px;color:var(--ink-3);margin-bottom:16px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--ink);resize:vertical}
  .fld textarea{min-height:96px;line-height:1.6}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .pin{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer;user-select:none}
  .pin input{width:16px;height:16px;accent-color:var(--accent)} .pin span{font-size:13px;font-weight:600}
  .err{font-size:12px;color:#e06a5f;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 11px;margin-bottom:12px;display:none}
  .err.show{display:block}
  .form-act{display:flex;gap:9px;margin-top:4px}
  .btn{border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px}
  .btn.go{background:var(--accent);color:#fff;box-shadow:var(--glow);flex:1;justify-content:center}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}

  .listhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .listhead h2{font-size:15px;font-weight:800}
  .listhead .cnt{font-family:var(--mono);font-size:12px;color:var(--ink-3)}
  .alist{display:flex;flex-direction:column;gap:12px}
  .ann{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:16px 18px;position:relative;transition:.15s}
  .ann.pin{border-color:var(--accent);background:var(--accent-soft)}
  .ann-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px}
  .pintag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--accent-ink)}
  .ann-date{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);margin-left:auto}
  .ann h3{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .ann .body{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.65}
  .ann .by{font-size:11.5px;color:var(--ink-3);margin-top:9px}
  .ann-act{display:flex;gap:7px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2)}
  .mini{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2);border-radius:8px;padding:6px 11px;cursor:pointer}
  .mini:hover{border-color:var(--accent);color:var(--accent-ink)}
  .mini.del:hover{border-color:#C0392B;color:#C0392B}

  .foot{margin-top:30px;color:var(--ink-3);font-size:12px;border-top:1px solid var(--line);padding-top:16px}

  .ov{display:none;position:fixed;inset:0;background:rgba(50,40,20,.46);z-index:100;place-items:center;padding:20px}
  .ov.show{display:grid}
  .modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-2);width:min(400px,100%);padding:22px;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .modal h3{font-size:16px;font-weight:800;margin-bottom:7px}
  .modal p{font-size:13px;color:var(--ink-2);line-height:1.6}
  .modal .mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
  .btn.danger{background:#C0392B;color:#fff}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#16223A;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:200;display:flex;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .gate{display:none;position:fixed;inset:0;background:rgba(50,40,20,.55);backdrop-filter:blur(3px);z-index:300;place-items:center;padding:20px}
  .gate.show{display:grid}
  .gate-card{background:var(--surface);border-radius:18px;box-shadow:var(--sh-2);max-width:380px;width:100%;padding:26px;text-align:center}
  .gate-card .gi{width:54px;height:54px;border-radius:15px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin:0 auto 14px}
  .gate-card h2{font-size:18px;font-weight:800} .gate-card p{font-size:13px;color:var(--ink-2);margin-top:9px;line-height:1.65}
  .gate-card .ga{display:flex;flex-direction:column;gap:9px;margin-top:18px}
  .gate-card .ga .btn{justify-content:center;text-align:center;flex:none}
  .fld input[type=file]{padding:7px;cursor:pointer}
  .att-prev{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
  .att-item{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:5px 8px;font-size:12px;max-width:210px}
  .att-item img{width:34px;height:34px;object-fit:cover;border-radius:6px;flex:none}
  .att-item .att-ic{color:var(--accent);display:grid;place-items:center;flex:none}
  .att-item .att-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .att-item .att-x{margin-left:auto;border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:16px;line-height:1;flex:none}
  .att-item .att-x:hover{color:#C0392B}
</style>
<script src="../08_共用/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo" id="logo"></div>
    <div><b>公告後台</b><span class="en">ANNOUNCEMENT ADMIN</span></div>
    <div class="right"><a class="home-btn" href="../index.html"><span id="homeic"></span>回平台首頁</a></div>
  </div>

  <div class="note"><span id="noteic"></span><div><b>測試介面</b>：發布的公告會顯示在平台首頁布告欄。目前為測試資料，尚未接資料庫；接上後台後即可同步。</div></div>

  <div class="cols">
    <div class="card form">
      <h2 id="formtitle"><span id="formic"></span>新增公告</h2>
      <div class="fh-sub" id="formsub">填寫後發布到首頁布告欄</div>
      <div class="err" id="err"></div>
      <div class="fld"><label>標題</label><input id="a-title" maxlength="40" placeholder="例：端午連假公告"></div>
      <div class="fld"><label>分類</label><select id="a-cat"><option>一般</option><option>重要</option><option>活動</option><option>系統</option></select></div>
      <div class="fld"><label>內容</label><textarea id="a-body" maxlength="300" placeholder="公告內文…"></textarea></div>
      <div class="fld"><label>發布對象</label>
        <select id="a-aud" onchange="audChange()">
          <option value="all">全公司（所有人都看得到）</option>
          <option value="dept">指定部門</option>
          <option value="person">指定人員</option>
        </select>
        <div id="a-aud-dept-wrap" style="display:none;margin-top:8px"><select id="a-aud-dept" onchange="audDeptChange()"></select></div>
        <div id="a-aud-person-wrap" style="display:none;margin-top:8px"><select id="a-aud-person"></select></div>
      </div>
      <div class="fld"><label>上架時間（留空＝立即上架）</label><input type="datetime-local" id="a-pub"></div>
      <div class="fld"><label>下架時間</label>
        <input type="datetime-local" id="a-exp">
        <label class="pin" style="margin-top:8px"><input type="checkbox" id="a-never" checked onchange="neverChange()"><span>永不下架</span></label>
      </div>
      <div class="fld"><label>附件 / 照片（選填，最多 3 個；圖片自動壓縮）</label>
        <input type="file" id="a-files" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" onchange="onFiles(event)">
        <div class="att-prev" id="a-prev"></div></div>
      <div class="fld"><label class="pin"><input type="checkbox" id="a-pin"><span>置頂顯示（釘選於布告欄最上方）</span></label></div>
      <div class="form-act">
        <button class="btn go" id="submitbtn" onclick="submitAnn()"><span id="subic"></span>發布公告</button>
        <button class="btn ghost" id="cancelbtn" onclick="resetForm()" style="display:none">取消</button>
      </div>
    </div>

    <div>
      <div class="listhead"><h2>已發布公告</h2><span class="cnt" id="cnt"></span></div>
      <div class="alist" id="alist"></div>
    </div>
  </div>

  <div class="foot">公告後台 · 企業平台。後端接上後，此頁的新增 / 編輯 / 刪除 / 置頂將直接寫入資料庫並同步首頁布告欄。</div>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<div class="gate" id="gate"><div class="gate-card">
  <div class="gi" id="gateic"></div>
  <h2>需要管理者身分</h2>
  <p>公告後台僅限管理者使用。請回首頁切換為「管理者」，或以管理者身分繼續檢視（測試）。</p>
  <div class="ga">
    <button class="btn go" onclick="grantAdmin()">以管理者身分繼續（測試）</button>
    <a class="btn ghost" href="../index.html">回平台首頁</a>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script src="../08_共用/store.js"></script>
<script>
const IC={
  mega:'<path d="M4 10v4h3l6 4V6L7 10H4Z"/><path d="M16.5 9a4 4 0 0 1 0 6"/>',
  home:'<path d="M3.5 11.5 12 4.2l8.5 7.3M5.8 10v9.6h12.4V10"/>',
  star:'<path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9 6.8 19.6l1-5.8L3.5 9.7l5.9-.9z"/>',
  edit:'<path d="M4 20h4L19.5 8.5l-4-4L4 16z"/><path d="M14.5 5.5l4 4"/>',
  trash:'<path d="M4 7h16M9.5 7V4.5h5V7M6.5 7l1 13h9l1-13"/>',
  plus:'<path d="M12 5.5v13M5.5 12h13"/>',
  check:'<path d="M5 12.5l4.5 4.5L19 7"/>',
  shield:'<path d="M12 3l7 2.5V11c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V5.5z"/><path d="M9 12l2 2 4-4"/>'
};
const ic=(n,s=20)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${IC[n]||IC.mega}</svg>`;
document.getElementById("logo").innerHTML=ic("mega",24);
document.getElementById("homeic").innerHTML=ic("home",15);
document.getElementById("noteic").innerHTML=ic("mega",17);
document.getElementById("formic").innerHTML=ic("plus",17);
document.getElementById("subic").innerHTML=ic("check",15);
document.getElementById("gateic").innerHTML=ic("shield",26);

const ME=EHub.getSession()||{name:"測試管理者",dept:"管理部"};
const TODAY=EHub.ymd(EHub.today0());
const CAT=EHub.CAT;

let ANN=EHub.loadAnn();                       // 共用資料層（與首頁布告欄同一份）
let editingId=null, nextId=ANN.reduce((m,a)=>Math.max(m,a.id),0)+1;

function sorted(){return [...ANN].sort((a,b)=>(b.pinned-a.pinned)||(b.date<a.date?-1:b.date>a.date?1:b.id-a.id))}
function render(){
  document.getElementById("cnt").textContent=`${ANN.length} 則`;
  document.getElementById("alist").innerHTML=sorted().map(annCard).join("");
}
function annCard(a){
  const m=CAT[a.cat]||CAT["一般"];
  const sl=schedLabel(a), au=audLabel(a), slc=(sl==="生效中"?"#2F8F5B":sl==="排程中"?"#B7791F":"#9aa4b5");
  return `<div class="ann ${a.pinned?"pin":""}">
    <div class="ann-top">
      <span class="badge" style="color:${m.c};background:${m.bg}">${a.cat}</span>
      ${a.pinned?`<span class="pintag">${ic("star",13)}置頂</span>`:""}
      <span class="ann-date">${a.date}</span>
    </div>
    <h3>${esc(a.title)}</h3>
    <div class="body">${esc(a.body)}</div>
    <div class="by">發布單位：${esc(a.by)}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:7px">
      <span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line-2)">對象：${esc(au)}</span>
      <span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--surface-2);color:${slc};border:1px solid var(--line-2)">${sl}${a.pubAt?" · 上架 "+esc(a.pubAt.replace("T"," ")):""}${a.expAt?" · 下架 "+esc(a.expAt.replace("T"," ")):""}</span>
    </div>
    <div class="ann-act">
      <button class="mini" onclick="editAnn(${a.id})">${ic("edit",14)}編輯</button>
      <button class="mini" onclick="togglePin(${a.id})">${ic("star",14)}${a.pinned?"取消置頂":"置頂"}</button>
      <button class="mini del" onclick="askDel(${a.id})">${ic("trash",14)}刪除</button>
    </div></div>`;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function showErr(m){const e=document.getElementById("err");e.textContent=m;e.classList.add("show")}
function clearErr(){document.getElementById("err").classList.remove("show")}

/* ===== 附件 / 照片（demo：圖片壓縮後存 base64 進 localStorage）===== */
let formFiles=[]; const MAX_ATT=3;
const clipSVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5 12.5 21a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L9.7 18.5a1.7 1.7 0 0 1-2.4-2.4l7.8-7.8"/></svg>';
function onFiles(e){
  const fs=[...e.target.files]; e.target.value="";
  fs.forEach(function(f){
    if(formFiles.length>=MAX_ATT){toast("最多 "+MAX_ATT+" 個附件");return;}
    if(f.type.indexOf("image/")===0){ compressImage(f,function(d){ formFiles.push({name:f.name,type:"image/jpeg",data:d}); renderPrev(); }); }
    else{ if(f.size>1.5*1024*1024){toast(f.name+" 超過 1.5MB，未加入");return;}
      const r=new FileReader(); r.onload=function(){ formFiles.push({name:f.name,type:f.type||"file",data:r.result}); renderPrev(); }; r.readAsDataURL(f); }
  });
}
function compressImage(file,cb){
  const img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){ URL.revokeObjectURL(url);
    var max=1200,w=img.width,h=img.height;
    if(w>max||h>max){var s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    var c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",0.82));
  };
  img.onerror=function(){URL.revokeObjectURL(url);toast("圖片讀取失敗");};
  img.src=url;
}
/* 種子附件的 data 是「根相對路徑」（如 08_共用/ann/duanwu.jpg），在 06 子資料夾要補 ../；
   使用者上傳的 base64（data:）與已補的 ../ 路徑原樣不動。 */
function attSrc(d){ return (d && !/^data:/.test(d) && !/^\.\.\//.test(d)) ? "../"+d : d; }
function renderPrev(){
  var box=document.getElementById("a-prev"); if(!box)return;
  box.innerHTML=formFiles.map(function(f,i){ return '<div class="att-item">'+(f.type.indexOf("image/")===0?'<img src="'+attSrc(f.data)+'">':'<span class="att-ic">'+clipSVG+'</span>')+'<span class="att-nm">'+EHub.esc(f.name)+'</span><button class="att-x" onclick="rmFile('+i+')">×</button></div>'; }).join("");
}
function rmFile(i){formFiles.splice(i,1);renderPrev();}

/* ===== 發布對象 / 上下架時間 ===== */
function fillAudDepts(){
  var depts=[]; EHub.USERS.forEach(function(u){if(depts.indexOf(u.dept)<0)depts.push(u.dept);});
  document.getElementById("a-aud-dept").innerHTML=depts.map(function(d){return '<option value="'+esc(d)+'">'+esc(d)+'</option>';}).join("");
  audDeptChange();
}
function audChange(){
  var v=document.getElementById("a-aud").value;
  document.getElementById("a-aud-dept-wrap").style.display=(v==="dept"||v==="person")?"":"none";
  document.getElementById("a-aud-person-wrap").style.display=(v==="person")?"":"none";
}
function audDeptChange(){
  var d=document.getElementById("a-aud-dept").value;
  var ppl=EHub.USERS.filter(function(u){return u.dept===d;});
  document.getElementById("a-aud-person").innerHTML=ppl.map(function(u){return '<option value="'+esc(u.name)+'">'+esc(u.name)+'</option>';}).join("");
}
function neverChange(){
  var nv=document.getElementById("a-never").checked, exp=document.getElementById("a-exp");
  exp.disabled=nv; if(nv)exp.value="";
}
function readAud(){
  var v=document.getElementById("a-aud").value;
  if(v==="dept")return {scope:"dept",dept:document.getElementById("a-aud-dept").value};
  if(v==="person")return {scope:"person",dept:document.getElementById("a-aud-dept").value,person:document.getElementById("a-aud-person").value};
  return {scope:"all"};
}
function audLabel(a){var u=a.aud||{scope:"all"};return u.scope==="dept"?("部門・"+u.dept):u.scope==="person"?("個人・"+(u.person||"")):"全公司";}
function schedLabel(a){var n=Date.now();
  if(a.pubAt&&new Date(a.pubAt).getTime()>n)return "排程中";
  if(a.expAt&&new Date(a.expAt).getTime()<n)return "已下架";
  return "生效中";}

function submitAnn(){
  clearErr();
  const title=document.getElementById("a-title").value.trim();
  const cat=document.getElementById("a-cat").value;
  const body=document.getElementById("a-body").value.trim();
  const pinned=document.getElementById("a-pin").checked;
  if(!title)return showErr("請填寫標題。");
  if(!body)return showErr("請填寫內容。");
  const attBytes=formFiles.reduce((s,f)=>s+(f.data?f.data.length:0),0);
  if(attBytes>4*1024*1024)return showErr("附件總量過大，請縮小或減少（demo localStorage 上限約 5MB）。");
  const att=formFiles.slice();
  const aud=readAud();
  const pubAt=document.getElementById("a-pub").value||"";
  const expAt=document.getElementById("a-never").checked?"":(document.getElementById("a-exp").value||"");
  // 先套用記憶體變更，並備妥回滾（存檔失敗時撤回，避免 UI 出現假成功公告）
  let rollback, isEdit=!!editingId;
  if(editingId){
    const a=ANN.find(x=>x.id===editingId);
    const prev=Object.assign({},a);
    Object.assign(a,{title,cat,body,pinned,att,aud,pubAt,expAt});
    rollback=()=>{ Object.assign(a,prev); };
  }else{
    ANN.unshift({id:nextId++,title,cat,body,pinned,date:TODAY,by:ME.dept,att,aud,pubAt,expAt});
    rollback=()=>{ ANN.shift(); nextId--; };
  }
  EHub.saveAnn(ANN);
  if(EHub.storageDegraded && EHub.storageDegraded()){ rollback(); return showErr("儲存失敗（容量不足），請縮小附件。"); }
  toast(isEdit?"公告已更新":"公告已發布");
  resetForm();render();
}
function editAnn(id){
  const a=ANN.find(x=>x.id===id);if(!a)return;
  editingId=id;
  document.getElementById("a-title").value=a.title;
  document.getElementById("a-cat").value=a.cat;
  document.getElementById("a-body").value=a.body;
  document.getElementById("a-pin").checked=a.pinned;
  var aud=a.aud||{scope:"all"};
  document.getElementById("a-aud").value=aud.scope; audChange();
  if(aud.scope!=="all"){document.getElementById("a-aud-dept").value=aud.dept||"";audDeptChange();if(aud.scope==="person")document.getElementById("a-aud-person").value=aud.person||"";}
  document.getElementById("a-pub").value=a.pubAt||"";
  document.getElementById("a-never").checked=!a.expAt;
  document.getElementById("a-exp").value=a.expAt||"";
  neverChange();
  formFiles=(a.att||[]).slice();renderPrev();
  document.getElementById("formtitle").innerHTML=ic("edit",17)+" 編輯公告";
  document.getElementById("formsub").textContent="修改後儲存，立即更新布告欄";
  document.getElementById("submitbtn").innerHTML=ic("check",15)+" 儲存變更";
  document.getElementById("cancelbtn").style.display="";
  clearErr();window.scrollTo({top:0,behavior:"smooth"});
  document.getElementById("a-title").focus();
}
function resetForm(){
  editingId=null;
  ["a-title","a-body"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("a-cat").value="一般";
  document.getElementById("a-pin").checked=false;
  document.getElementById("a-aud").value="all"; audChange();
  document.getElementById("a-pub").value=""; document.getElementById("a-exp").value="";
  document.getElementById("a-never").checked=true; neverChange();
  formFiles=[];renderPrev();
  document.getElementById("formtitle").innerHTML=ic("plus",17)+" 新增公告";
  document.getElementById("formsub").textContent="填寫後發布到首頁布告欄";
  document.getElementById("submitbtn").innerHTML=ic("check",15)+" 發布公告";
  document.getElementById("cancelbtn").style.display="none";
  clearErr();
}
function togglePin(id){const a=ANN.find(x=>x.id===id);if(!a)return;a.pinned=!a.pinned;EHub.saveAnn(ANN);render();toast(a.pinned?"已置頂":"已取消置頂")}

/* delete confirm modal */
const ov=document.getElementById("ov");
ov.addEventListener("click",e=>{if(e.target===ov)closeModal()});
function closeModal(){ov.classList.remove("show");document.getElementById("modal").innerHTML=""}
function askDel(id){
  const a=ANN.find(x=>x.id===id);if(!a)return;
  document.getElementById("modal").innerHTML=`
    <h3>刪除公告？</h3>
    <p>確定要刪除「<b>${esc(a.title)}</b>」嗎？此動作無法復原。</p>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDel(${id})">確定刪除</button></div>`;
  ov.classList.add("show");
}
function doDel(id){ANN=ANN.filter(x=>x.id!==id);EHub.saveAnn(ANN);if(editingId===id)resetForm();closeModal();render();toast("公告已刪除")}

let tt;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2400)}

/* ===== 權限 gate（與首頁/會議室後台共用 localStorage 角色）===== */
function isAdmin(){return EHub.isAdmin()}
function grantAdmin(){EHub.previewAdmin();document.getElementById("gate").classList.remove("show");render()}
fillAudDepts();
neverChange(); // #a-never 預設 checked → 初始化時同步 disable #a-exp（否則填了會被靜默忽略）
if(isAdmin())render(); else document.getElementById("gate").classList.add("show");
</script>
