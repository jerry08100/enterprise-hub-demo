<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議室後台 Room Admin — 企業平台</title>
<style>
  :root{
    --bg:#EEF3F2; --surface:#FFFFFF; --surface-2:#F2F6F5;
    --ink:#16302B; --ink-2:#5A6E68; --ink-3:#8Aa39c;
    --line:#DEEAE6; --line-2:#EAF1EF;
    --accent:#0F8A72; --accent-ink:#0B6E5B; --accent-soft:#DCEFEA;
    --r:14px; --r-sm:9px; --r-lg:18px;
    --sh-1:0 1px 2px rgba(16,48,42,.05);
    --sh-2:0 16px 40px rgba(16,48,42,.12),0 2px 8px rgba(16,48,42,.06);
    --glow:0 8px 22px rgba(15,138,114,.26);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --warn:#B7791F; --warn-bg:#FBF1DD; --danger:#C0392B; --danger-bg:#F8E7E4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(rgba(16,48,42,.035) 1px,transparent 1px) 0 0/24px 24px,radial-gradient(1000px 560px at 88% -12%,rgba(15,138,114,.10),transparent 60%),var(--bg);
    background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  svg{display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
  .wrap{max-width:1020px;margin:0 auto;padding:34px 26px 70px}

  .topbar{display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap}
  .topbar .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:var(--glow);flex:none}
  .topbar b{font-size:18px} .topbar .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.2em;font-family:var(--mono)}
  .adminbadge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .home-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink-2);box-shadow:var(--sh-1);transition:.15s}
  .home-btn:hover{border-color:var(--accent);color:var(--accent-ink)}

  .note{display:flex;align-items:center;gap:9px;background:var(--accent-soft);border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin:14px 0 20px;font-size:12.5px;color:var(--accent-ink)}

  .datebar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .datebar .day{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 15px;font-weight:700;box-shadow:var(--sh-1)}
  .datebar .day .mono{font-family:var(--mono);color:var(--accent-ink);font-size:13px}
  .datebar .nav{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:18px;font-weight:700;cursor:pointer;box-shadow:var(--sh-1);line-height:1}
  .datebar .nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent-ink)}
  .datebar .nav:disabled{opacity:.38;cursor:not-allowed}
  .datebar .dpick{font-family:inherit;font-size:13px;font-weight:600;padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);box-shadow:var(--sh-1)}
  .datebar .dpick:focus{outline:none;border-color:var(--accent)}
  .datebar .hint{font-size:12px;color:var(--ink-3)}

  .rooms{display:flex;flex-direction:column;gap:16px}
  .room{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1);overflow:hidden;position:relative}
  .room::before{content:"";position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent),rgba(15,138,114,.3))}
  .room-h{display:flex;align-items:flex-start;gap:14px;padding:18px 22px 14px}
  .room-h .ico{width:44px;height:44px;border-radius:12px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;flex:none}
  .room-h h2{font-size:17px;font-weight:800}
  .room-h .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:999px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px}
  .room-h .acts{margin-left:auto;display:flex;gap:8px;align-self:center}
  .abtn{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:9px 13px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink-2)}
  .abtn:hover{border-color:var(--accent);color:var(--accent-ink)}
  .abtn.solid{background:var(--accent);color:#fff;border:none;box-shadow:var(--glow)}
  .abtn.solid:hover{filter:brightness(1.05);color:#fff}
  .room-b{display:grid;grid-template-columns:1fr 1.4fr;border-top:1px solid var(--line-2)}
  @media(max-width:720px){.room-b{grid-template-columns:1fr}}
  .panel{padding:15px 22px}
  .panel.notes{background:var(--warn-bg);border-right:1px solid var(--line-2)}
  @media(max-width:720px){.panel.notes{border-right:none;border-bottom:1px solid var(--line-2)}}
  .panel .ph{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;margin-bottom:10px}
  .panel.notes .ph{color:var(--warn)} .panel.book .ph{color:var(--accent-ink)}
  .panel.notes .ph .edit{margin-left:auto;font-size:11px;color:var(--warn);cursor:pointer;display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:7px;padding:3px 8px;background:var(--surface)}
  .panel.notes ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .panel.notes li{font-size:12.5px;color:#7A5A1E;line-height:1.5;padding-left:15px;position:relative}
  .panel.notes li::before{content:"";position:absolute;left:2px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--warn)}
  .bk{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .bk:last-child{border-bottom:none}
  .bk .t{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--accent-ink);white-space:nowrap;min-width:104px}
  .bk .ti{font-size:13px;font-weight:600;flex:1;min-width:80px}
  .bk .by{font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:999px;padding:2px 10px;white-space:nowrap}
  .bk .by b{color:var(--accent-ink);font-weight:700}
  .bk .cancel{border:1px solid var(--line);background:var(--surface);color:var(--ink-2);border-radius:7px;font-size:11.5px;font-weight:600;padding:5px 10px;cursor:pointer;white-space:nowrap}
  .bk .cancel:hover{border-color:var(--danger);color:var(--danger)}
  .empty{font-size:12.5px;color:var(--ink-3);padding:8px 0}
  .empty b{color:var(--accent-ink)}

  .foot{margin-top:30px;color:var(--ink-3);font-size:12px;border-top:1px solid var(--line);padding-top:16px}

  /* modal */
  .ov{display:none;position:fixed;inset:0;background:rgba(16,40,34,.46);z-index:100;place-items:center;padding:20px}
  .ov.show{display:grid}
  .modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-2);width:min(440px,100%);overflow:hidden;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .modal h3{font-size:16px;font-weight:800;padding:18px 20px 0}
  .modal .sub{font-size:12px;color:var(--ink-3);padding:3px 20px 0}
  .mbody{padding:16px 20px;display:flex;flex-direction:column;gap:13px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--ink);resize:vertical}
  .fld textarea{min-height:120px;line-height:1.7}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mfoot{display:flex;gap:9px;justify-content:flex-end;padding:14px 20px 18px}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}
  .btn.go{background:var(--accent);color:#fff;box-shadow:var(--glow)}
  .btn.danger{background:var(--danger);color:#fff}
  .modal p.warn{font-size:13px;color:var(--ink-2);padding:6px 20px 0;line-height:1.6}
  .err{font-size:12px;color:#e06a5f;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 11px;display:none}
  .err.show{display:block}

  /* 權限 gate */
  .gate{display:none;position:fixed;inset:0;background:rgba(16,40,34,.55);backdrop-filter:blur(3px);z-index:300;place-items:center;padding:20px}
  .gate.show{display:grid}
  .gate-card{background:var(--surface);border-radius:18px;box-shadow:var(--sh-2);max-width:380px;width:100%;padding:26px;text-align:center}
  .gate-card .gi{width:54px;height:54px;border-radius:15px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin:0 auto 14px}
  .gate-card h2{font-size:18px;font-weight:800} .gate-card p{font-size:13px;color:var(--ink-2);margin-top:9px;line-height:1.65}
  .gate-card .ga{display:flex;flex-direction:column;gap:9px;margin-top:18px}
  .gate-card .ga .btn{justify-content:center;display:flex;align-items:center;gap:7px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:200;display:flex;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="../../08_共用/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo" id="logo"></div>
    <div><b>會議室後台</b><span class="en">ROOM ADMIN</span></div>
    <span class="adminbadge" id="abadge"></span>
    <div class="right"><a class="home-btn" href="../../index.html"><span id="homeic"></span>回平台首頁</a></div>
  </div>

  <div class="note"><span id="noteic"></span><div>管理者模式：可<b>取消任何人</b>的預約、<b>代為預約</b>、<b>編輯使用注意事項</b>。測試資料，尚未接資料庫。</div></div>

  <div class="datebar">
    <button class="nav" id="prev" onclick="step(-1)" title="前一天">‹</button>
    <span class="day" id="daychip"></span>
    <button class="nav" id="next" onclick="step(1)" title="後一天">›</button>
    <input type="date" id="datepick" class="dpick" onchange="pickDate(this.value)">
    <span class="hint">管理今日起 30 天內</span>
  </div>

  <div class="rooms" id="rooms"></div>
  <div class="foot">會議室後台 · 企業平台。後端接上後，此頁的取消 / 代為預約 / 注意事項編輯將直接寫入資料庫並與前台同步。</div>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<div class="gate" id="gate"><div class="gate-card">
  <div class="gi" id="gateic"></div>
  <h2>需要管理者身分</h2>
  <p>會議室後台僅限管理者使用。請回首頁切換為「管理者」，或以管理者身分繼續檢視（測試）。</p>
  <div class="ga">
    <button class="btn go" onclick="grantAdmin()"><span id="grantic"></span>以管理者身分繼續（測試）</button>
    <a class="btn ghost" href="../../index.html">回平台首頁</a>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script src="../../08_共用/store.js"></script>
<script>
const IC={
  door:'<path d="M3 21h18M6 21V4.5a1.5 1.5 0 0 1 1.5-1.5h9A1.5 1.5 0 0 1 18 4.5V21M14 12h.5"/>',
  clock:'<circle cx="12" cy="12" r="8.4"/><path d="M12 7.6V12l3 1.8"/>',
  info:'<circle cx="12" cy="12" r="8.4"/><path d="M12 11v5M12 7.7h.01"/>',
  plus:'<path d="M12 5.5v13M5.5 12h13"/>',
  home:'<path d="M3.5 11.5 12 4.2l8.5 7.3M5.8 10v9.6h12.4V10"/>',
  cal:'<rect x="3.5" y="5" width="17" height="15.5" rx="2"/><path d="M3.5 9.6h17M8 3.5v3.2M16 3.5v3.2"/>',
  users:'<circle cx="9" cy="8.5" r="3"/><path d="M3.5 19.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 6.2a3 3 0 0 1 0 5.6M16.5 14.6c2.4.5 4 2.4 4 4.9"/>',
  edit:'<path d="M4 20h4L19.5 8.5l-4-4L4 16z"/><path d="M14.5 5.5l4 4"/>',
  shield:'<path d="M12 3l7 2.5V11c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V5.5z"/><path d="M9 12l2 2 4-4"/>'
};
const ic=(n,s=22)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${IC[n]||IC.info}</svg>`;
document.getElementById("logo").innerHTML=ic("door",24);
document.getElementById("homeic").innerHTML=ic("home",15);
document.getElementById("noteic").innerHTML=ic("shield",17);
document.getElementById("abadge").innerHTML=ic("shield",13)+"管理者";
document.getElementById("gateic").innerHTML=ic("shield",26);
document.getElementById("grantic").innerHTML=ic("shield",15);

/* ===== 權限 gate（角色與首頁共用 localStorage）===== */
function isAdmin(){return EHub.isAdmin()}
function grantAdmin(){EHub.previewAdmin();document.getElementById("gate").classList.remove("show");init()}

const USERS=EHub.USERS;
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
const T0=new Date();T0.setHours(0,0,0,0);
const TODAY=ymd(T0), MAXD=ymd(addDays(T0,30));
const WK=["日","一","二","三","四","五","六"], D=n=>ymd(addDays(T0,n));
function dlabel(s){const[y,m,da]=s.split("-").map(Number);const d=new Date(y,m-1,da);
  const tag=s===TODAY?"（今天）":s===D(1)?"（明天）":"";return `${m}/${da}（週${WK[d.getDay()]}）${tag}`}

// 租借資料來自共用資料層（與會議室前台同一份）
let ROOMS=EHub.loadRooms();

let curDate=TODAY;
const toMin=t=>{const[h,m]=t.split(":").map(Number);return h*60+m};
function dayBooks(r,d){return [...(r.book[d]||[])].sort((a,b)=>toMin(a.s)-toMin(b.s))}
function clampDate(s){return s<TODAY?TODAY:s>MAXD?MAXD:s}
function setDate(s){curDate=clampDate(s);render()}
function step(n){setDate(ymd(addDays(new Date(curDate+"T00:00:00"),n)))}
function pickDate(v){if(v)setDate(v)}

function render(){
  const dp=document.getElementById("datepick");dp.min=TODAY;dp.max=MAXD;dp.value=curDate;
  document.getElementById("prev").disabled=curDate<=TODAY;
  document.getElementById("next").disabled=curDate>=MAXD;
  document.getElementById("daychip").innerHTML=ic("cal",15)+`<span class="mono">${dlabel(curDate)}</span>`;
  document.getElementById("rooms").innerHTML=ROOMS.map(roomCard).join("");
}
function roomCard(r){
  const books=dayBooks(r,curDate);
  const bookHTML=books.length?books.map(b=>{
    const real=r.book[curDate].indexOf(b);
    return `<div class="bk"><span class="t">${b.s}–${b.e}</span><span class="ti">${EHub.esc(b.title)}</span>
      <span class="by"><b>${EHub.esc(b.dept)}</b>・${EHub.esc(b.name)}</span>
      <button class="cancel" onclick="askCancel('${r.id}','${curDate}',${real})">取消</button></div>`;
  }).join("") : `<div class="empty">此日尚無租借，<b>全日可預約</b>。</div>`;
  return `<div class="room">
    <div class="room-h">
      <div class="ico">${ic("door",22)}</div>
      <div><h2>${r.name}</h2>
        <div class="chips"><span class="chip">${ic("users",13)} 可容納 ${r.cap} 人</span><span class="chip">${r.loc}</span>${r.feat.map(f=>`<span class="chip">${f}</span>`).join("")}</div>
      </div>
      <div class="acts"><button class="abtn solid" onclick="openBook('${r.id}')">${ic("plus",15)} 代為預約</button></div>
    </div>
    <div class="room-b">
      <div class="panel notes"><div class="ph">${ic("info",15)} 使用注意事項 <span class="edit" onclick="editNotes('${r.id}')">${ic("edit",12)} 編輯</span></div>
        <ul>${r.notes.map(n=>`<li>${EHub.esc(n)}</li>`).join("")}</ul></div>
      <div class="panel book"><div class="ph">${ic("clock",15)} ${dlabel(curDate)} 租借情形</div>${bookHTML}</div>
    </div></div>`;
}

/* ===== modal ===== */
const ov=document.getElementById("ov");
function closeModal(){ov.classList.remove("show");document.getElementById("modal").innerHTML=""}
ov.addEventListener("click",e=>{if(e.target===ov)closeModal()});
function showErr(m){const e=document.getElementById("err");if(e){e.textContent=m;e.classList.add("show")}}

function openBook(rid){
  const r=ROOMS.find(x=>x.id===rid);
  document.getElementById("modal").innerHTML=`
    <h3>代為預約 ${r.name}</h3>
    <div class="sub">${r.loc} · 可容納 ${r.cap} 人 · 限今日起 30 天內</div>
    <div class="mbody">
      <div class="err" id="err"></div>
      <div class="fld"><label>會議名稱</label><input id="f-title" placeholder="例：產品討論會議" maxlength="30"></div>
      <div class="fld"><label>日期</label><input id="f-date" type="date" min="${TODAY}" max="${MAXD}" value="${curDate}"></div>
      <div class="row2">
        <div class="fld"><label>開始</label><input id="f-s" type="time" value="09:00" step="900"></div>
        <div class="fld"><label>結束</label><input id="f-e" type="time" value="10:00" step="900"></div>
      </div>
      <div class="fld"><label>預約人（代訂）</label><select id="f-who">${USERS.map(u=>`<option value="${u.name}">${u.dept}・${u.name}</option>`).join("")}</select></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn go" onclick="submitBook('${r.id}')">確認預約</button></div>`;
  ov.classList.add("show");
  setTimeout(()=>document.getElementById("f-title").focus(),40);
}
function submitBook(rid){
  const r=ROOMS.find(x=>x.id===rid);
  const title=document.getElementById("f-title").value.trim();
  const date=document.getElementById("f-date").value;
  const s=document.getElementById("f-s").value, e=document.getElementById("f-e").value;
  const who=document.getElementById("f-who").value;
  if(!title)return showErr("請填寫會議名稱。");
  if(!date||date<TODAY||date>MAXD)return showErr("只能預約今日起 30 天內的日期。");
  if(!s||!e||toMin(e)<=toMin(s))return showErr("結束時間需晚於開始時間。");
  const clash=(r.book[date]||[]).find(b=>toMin(s)<toMin(b.e)&&toMin(e)>toMin(b.s));
  if(clash)return showErr(`該日時段與「${clash.title}」(${clash.s}–${clash.e}) 重疊。`);
  const u=USERS.find(x=>x.name===who)||{name:who,dept:"—"};
  (r.book[date]=r.book[date]||[]).push({s,e,title,name:u.name,dept:u.dept});
  EHub.saveRooms(ROOMS);
  closeModal();setDate(date);toast(`已代為預約 ${r.name}　${dlabel(date)}　${s}–${e}`);
}

function askCancel(rid,date,idx){
  const r=ROOMS.find(x=>x.id===rid), b=(r.book[date]||[])[idx];if(!b)return;
  document.getElementById("modal").innerHTML=`
    <h3 style="padding-bottom:0">取消這筆預約？</h3>
    <p class="warn">${r.name} · ${dlabel(date)}<br><b>${b.s}–${b.e}　${EHub.esc(b.title)}</b>（${EHub.esc(b.dept)}・${EHub.esc(b.name)}）<br>取消後無法復原。</p>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">返回</button><button class="btn danger" onclick="doCancel('${rid}','${date}',${idx})">確定取消</button></div>`;
  ov.classList.add("show");
}
function doCancel(rid,date,idx){
  const r=ROOMS.find(x=>x.id===rid);
  if(r.book[date])r.book[date].splice(idx,1);
  EHub.saveRooms(ROOMS);
  closeModal();render();toast("已取消該筆預約");
}

function editNotes(rid){
  const r=ROOMS.find(x=>x.id===rid);
  document.getElementById("modal").innerHTML=`
    <h3>編輯使用注意事項</h3>
    <div class="sub">${r.name}　一行一條</div>
    <div class="mbody"><div class="fld"><textarea id="f-notes">${EHub.esc(r.notes.join("\n"))}</textarea></div></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn go" onclick="saveNotes('${r.id}')">儲存</button></div>`;
  ov.classList.add("show");
}
function saveNotes(rid){
  const r=ROOMS.find(x=>x.id===rid);
  r.notes=document.getElementById("f-notes").value.split("\n").map(x=>x.trim()).filter(Boolean);
  EHub.saveRooms(ROOMS);
  closeModal();render();toast("注意事項已更新");
}

let tt;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2600)}

function init(){render()}
if(isAdmin())init(); else document.getElementById("gate").classList.add("show");
// 前台/他分頁改了租借 → 即時更新
window.addEventListener("storage",e=>{if(e.key===EHub.ROOM_KEY){ROOMS=EHub.loadRooms();if(isAdmin())render()}});
</script>
</body>
</html>
