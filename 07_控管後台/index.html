<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功能控管 Access Control — 企業平台</title>
<style>
  :root{
    --bg:#EEF1F4; --surface:#FFFFFF; --surface-2:#F2F4F7;
    --ink:#1E293B; --ink-2:#5A6678; --ink-3:#94A1B2;
    --line:#E2E7EE; --line-2:#EDF0F4;
    --accent:#475569; --accent-ink:#334155; --accent-soft:#E5E9F0;
    --ok:#0F8A72; --ok-bg:#DCEFEA; --warn:#B7791F; --warn-bg:#FBF1DD;
    --r:13px; --r-lg:18px;
    --sh-1:0 1px 2px rgba(30,41,59,.05);
    --sh-2:0 16px 40px rgba(30,41,59,.13),0 2px 8px rgba(30,41,59,.06);
    --glow:0 8px 22px rgba(71,85,105,.25);
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(rgba(30,41,59,.035) 1px,transparent 1px) 0 0/24px 24px,radial-gradient(1000px 560px at 88% -12%,rgba(71,85,105,.10),transparent 60%),var(--bg);
    background-attachment:fixed;color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  svg{display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
  .wrap{max-width:980px;margin:0 auto;padding:34px 26px 70px}

  .topbar{display:flex;align-items:center;gap:13px;margin-bottom:8px;flex-wrap:wrap}
  .topbar .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:var(--glow);flex:none}
  .topbar b{font-size:18px} .topbar .en{display:block;font-size:10px;color:var(--ink-3);letter-spacing:.2em;font-family:var(--mono)}
  .adminbadge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .home-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink-2);box-shadow:var(--sh-1);transition:.15s}
  .home-btn:hover{border-color:var(--accent);color:var(--accent-ink)}

  .note{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin:16px 0 14px;box-shadow:var(--sh-1)}
  .note .ic{color:var(--accent);flex:none;margin-top:1px}
  .note .t{font-size:12.5px;color:var(--ink-2);line-height:1.6}
  .note .fixed-list{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
  .pill{font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px;background:var(--ok-bg);color:var(--ok);display:inline-flex;align-items:center;gap:5px}

  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--sh-1)}
  table{border-collapse:collapse;width:100%;min-width:600px}
  thead th{position:sticky;top:0;background:var(--surface-2);border-bottom:1px solid var(--line);padding:13px 14px;text-align:left;font-size:12.5px;font-weight:700;color:var(--ink-2);z-index:2}
  thead th.feat{text-align:center}
  thead th.feat .fn{font-size:13px;font-weight:800;color:var(--ink)}
  thead th.feat .cnt{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);font-weight:600}
  thead th.feat .soon{display:inline-block;font-size:9.5px;font-weight:700;color:var(--warn);background:var(--warn-bg);border-radius:999px;padding:1px 7px;margin-left:5px;vertical-align:middle}
  th.colname{left:0;position:sticky;z-index:3;background:var(--surface-2);min-width:170px}
  tbody td{border-top:1px solid var(--line-2);padding:11px 14px;vertical-align:middle}
  td.member{position:sticky;left:0;background:var(--surface);min-width:170px}
  td.member .mname{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:9px}
  td.member .mav{width:30px;height:30px;border-radius:50%;background:var(--surface-2);color:var(--ink-2);display:grid;place-items:center;font-weight:700;font-size:12.5px;flex:none}
  td.member .mdept{font-size:11.5px;color:var(--ink-3);margin-left:39px}
  td.cell{text-align:center}
  tbody tr:hover td{background:var(--surface-2)} tbody tr:hover td.member{background:var(--surface-2)}
  .sw{position:relative;display:inline-flex;cursor:pointer}
  .sw input{position:absolute;opacity:0;width:0;height:0}
  .sw .track{width:42px;height:24px;border-radius:999px;background:rgba(128,128,128,.35);transition:.18s;display:inline-block}
  .sw .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.18s}
  .sw input:checked + .track{background:var(--ok)}
  .sw input:checked ~ .knob{transform:translateX(18px)}

  .foot{margin-top:26px;color:var(--ink-3);font-size:12px;line-height:1.7;border-top:1px solid var(--line);padding-top:16px}

  .gate{display:none;position:fixed;inset:0;background:rgba(30,41,59,.55);backdrop-filter:blur(3px);z-index:300;place-items:center;padding:20px}
  .gate.show{display:grid}
  .gate-card{background:var(--surface);border-radius:18px;box-shadow:var(--sh-2);max-width:380px;width:100%;padding:26px;text-align:center}
  .gate-card .gi{width:54px;height:54px;border-radius:15px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin:0 auto 14px}
  .gate-card h2{font-size:18px;font-weight:800} .gate-card p{font-size:13px;color:var(--ink-2);margin-top:9px;line-height:1.65}
  .gate-card .ga{display:flex;flex-direction:column;gap:9px;margin-top:18px}
  .btn{border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn.go{background:var(--accent);color:#fff;box-shadow:var(--glow)} .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#16223A;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:200;display:flex;gap:9px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="../08_共用/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo" id="logo"></div>
    <div><b>功能控管</b><span class="en">ACCESS CONTROL</span></div>
    <span class="adminbadge" id="abadge"></span>
    <div class="right"><a class="home-btn" href="../index.html"><span id="homeic"></span>回平台首頁</a></div>
  </div>

  <div class="note"><span class="ic" id="noteic"></span><div class="t">
    <b>固定功能</b>全員預設開放、不需授權；下表只管<b>選配功能</b>——勾選代表開通給該使用者，他下次進首頁就會看到。
    <div class="fixed-list" id="fixedList"></div>
  </div></div>

  <div class="tablewrap"><table id="grid"></table></div>

  <div class="foot">功能控管 · 企業平台。授權存於共用資料層（測試），接後端後改寫資料庫並與登入權限整合。每位使用者進首頁時依此表顯示可用工具。</div>
</div>

<div class="gate" id="gate"><div class="gate-card">
  <div class="gi" id="gateic"></div>
  <h2>需要管理者身分</h2>
  <p>功能控管僅限管理者使用。請回首頁切換為「管理者」，或以管理者身分繼續檢視（測試）。</p>
  <div class="ga">
    <button class="btn go" onclick="grantAdmin()">以管理者身分繼續（測試）</button>
    <a class="btn ghost" href="../index.html">回平台首頁</a>
  </div>
</div></div>
<div class="toast" id="toast"></div>

<script src="../08_共用/store.js"></script>
<script>
const IC={
  ctrl:'<path d="M4 6h8M17 6h3M4 12h3M12 12h8M4 18h6M15 18h5"/><circle cx="14.5" cy="6" r="2"/><circle cx="9.5" cy="12" r="2"/><circle cx="12.5" cy="18" r="2"/>',
  home:'<path d="M3.5 11.5 12 4.2l8.5 7.3M5.8 10v9.6h12.4V10"/>',
  shield:'<path d="M12 3l7 2.5V11c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V5.5z"/><path d="M9 12l2 2 4-4"/>',
  check:'<path d="M5 12.5l4.5 4.5L19 7"/>'
};
const ic=(n,s=18)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${IC[n]||IC.ctrl}</svg>`;
document.getElementById("logo").innerHTML=ic("ctrl",24);
document.getElementById("homeic").innerHTML=ic("home",15);
document.getElementById("noteic").innerHTML=ic("shield",18);
document.getElementById("abadge").innerHTML=ic("shield",13)+"管理者";
document.getElementById("gateic").innerHTML=ic("shield",26);

/* gate */
function isAdmin(){return EHub.isAdmin()}
function grantAdmin(){EHub.previewAdmin();document.getElementById("gate").classList.remove("show");init()}

const esc=EHub.esc;
const USERS=EHub.USERS;
const OPT=EHub.optionalFeatures();           // 選配功能 [{key,name,soon}]
const FIXED=EHub.FEATURES.filter(f=>f.fixed);
let ACC=EHub.loadAccess();                    // {name:[keys]}

function granted(name,key){return (ACC[name]||[]).indexOf(key)>=0}
function featName(key){const f=EHub.FEATURES.find(x=>x.key===key);return f?f.name:key}
function countFor(key){return USERS.filter(u=>granted(u.name,key)).length}

function render(){
  document.getElementById("fixedList").innerHTML=FIXED.map(ft=>`<span class="pill">${ic("check",12)}${ft.name}</span>`).join("");
  if(!OPT.length){document.getElementById("grid").innerHTML=`<tbody><tr><td style="padding:20px;color:var(--ink-3)">目前沒有選配功能。新增工具時把它在共用層標為 fixed:false 即可在此授權。</td></tr></tbody>`;return}
  const head=`<thead><tr><th class="colname">成員</th>${OPT.map(ft=>`<th class="feat" data-k="${ft.key}"><div class="fn">${ft.name}${ft.soon?'<span class="soon">未上線</span>':""}</div><div class="cnt" id="cnt-${ft.key}">${countFor(ft.key)} 人已開通</div></th>`).join("")}</tr></thead>`;
  const body=`<tbody>${USERS.map(u=>`<tr>
    <td class="member"><div class="mname"><span class="mav">${u.name[0]}</span>${esc(u.name)}</div><div class="mdept">${esc(u.dept)}</div></td>
    ${OPT.map(f=>`<td class="cell"><label class="sw"><input type="checkbox" ${granted(u.name,f.key)?"checked":""} data-user="${esc(u.name)}" data-key="${esc(f.key)}"><span class="track"></span><span class="knob"></span></label></td>`).join("")}
  </tr>`).join("")}</tbody>`;
  document.getElementById("grid").innerHTML=head+body;
}

function toggleGrant(name,key,on){
  const cur=new Set(ACC[name]||[]);
  if(on)cur.add(key); else cur.delete(key);
  const arr=[...cur];
  if(arr.length)ACC[name]=arr; else delete ACC[name];
  EHub.saveAccess(ACC);
  const c=document.getElementById("cnt-"+key);if(c)c.textContent=countFor(key)+" 人已開通";
  toast(on?`已開通：${name} · ${featName(key)}`:`已停用：${name} · ${featName(key)}`);
}

document.addEventListener("change", function(e){
  var t = e.target;
  if (t.matches && t.matches("input[data-user][data-key]")) {
    toggleGrant(t.getAttribute("data-user"), t.getAttribute("data-key"), t.checked);
  }
});

let tt;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2400)}

function init(){render()}
if(isAdmin())init(); else document.getElementById("gate").classList.add("show");
window.addEventListener("storage",e=>{if(e.key===EHub.ACCESS_KEY){ACC=EHub.loadAccess();if(isAdmin())render()}});
</script>
</body>
</html>
